<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MTG Life Counter</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 25, 45, 0.94);
      --panel-2: rgba(27, 37, 66, 0.94);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7ff;
      --muted: #aab4d6;
      --danger: #ff6b81;
      --good: #65d6a6;
      --warn: #ffd166;
      --accent: #8aa4ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(138, 164, 255, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(101, 214, 166, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    body.is-multiplayer,
    body.is-duel-scroll {
      overflow-y: auto;
    }

    body.is-multiplayer .table,
    body.is-duel-scroll .table.duel {
      height: auto;
      min-height: 0;
      overflow: visible;
    }

    body.is-duel-scroll .table.duel {
      grid-template-rows: auto auto;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; touch-action: manipulation; }

    .app-bar {
      display: grid;
      grid-template-columns: auto auto 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      padding: max(10px, env(safe-area-inset-top)) 12px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 12, 24, 0.78);
      backdrop-filter: blur(12px);
      z-index: 5;
    }

    .status {
      justify-self: center;
      min-width: 0;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-btn, .modal-btn, .chip-btn {
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      font-weight: 800;
    }

    .toolbar-btn {
      min-height: 40px;
      padding: 0 12px;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .toolbar-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .table {
      min-height: 0;
      height: 100%;
      display: grid;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    .table.duel {
      grid-template-rows: repeat(2, minmax(320px, 1fr));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .table.multiplayer {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: auto;
      align-content: start;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .player-card {
      position: relative;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 9px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
    }

    .multiplayer .player-card {
      min-height: 340px;
      grid-template-rows: auto auto auto;
    }

    .duel .player-card:first-child { transform: rotate(180deg); }

    .player-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .name {
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .head-actions { display: flex; gap: 6px; }

    .chip-btn {
      min-width: 48px;
      min-height: 36px;
      padding: 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .life-zone {
      min-height: 0;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 6px;
      position: relative;
    }

    .life-label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .life {
      border: 0;
      background: transparent;
      color: var(--text);
      width: 100%;
      padding: 0;
      text-align: center;
      font-size: clamp(3.2rem, 15vh, 7rem);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0;
    }

    .multiplayer .life { font-size: clamp(2.8rem, 13vh, 5.8rem); }

    .stat-row, .counter-row, .commander-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 6px 8px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .pill.danger { color: var(--danger); }
    .pill.good { color: var(--good); }
    .pill.warn { color: var(--warn); }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .life-btn {
      min-height: clamp(42px, 8vh, 66px);
      border: 1px solid var(--border);
      border-radius: 15px;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      font-size: 1.15rem;
      font-weight: 900;
    }

    .life-btn.minus { color: var(--danger); }
    .life-btn.plus { color: var(--good); }

    .cat-btn {
      grid-column: 2 / 4;
      justify-self: center;
      width: min(100%, 132px);
      min-height: 36px;
      border: 1px solid rgba(255, 209, 102, 0.5);
      border-radius: 13px;
      color: #ffd166;
      background: rgba(255, 209, 102, 0.12);
      font-size: 0.9rem;
      font-weight: 900;
      display: grid;
      grid-template-columns: 30px 1fr;
      align-items: center;
      gap: 8px;
      padding: 3px 10px 3px 4px;
    }

    .cat-btn img {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .cat-btn span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .delta-badge, .roll-badge {
      position: absolute;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transform: translateY(-50%) scale(0.98);
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .delta-badge {
      top: 50%;
      right: 8%;
      min-width: 58px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(10, 14, 28, 0.9);
      text-align: center;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .delta-badge.show, .roll-badge.show {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .delta-badge.positive { color: var(--good); }
    .delta-badge.negative { color: var(--danger); }
    .delta-badge.neutral { color: var(--text); }

    .roll-badge {
      top: 50%;
      left: 8%;
      min-width: 72px;
      min-height: 72px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      padding: 12px;
      background: rgba(245,247,255,0.96);
      color: #0b1020;
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
    }

    .roll-badge.coin-result {
      background: rgba(10, 14, 28, 0.9);
    }

    .roll-badge.coin-result .coin-face {
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.18),
        0 0 18px rgba(255, 209, 102, 0.72),
        0 8px 18px rgba(0,0,0,0.28);
    }

    .roll-badge.rolling {
      opacity: 1;
      animation: diceRoll 0.7s ease;
    }

    @keyframes diceRoll {
      0% { transform: translateY(-50%) scale(0.78) rotate(0deg); }
      20% { transform: translateY(-50%) scale(1.08) rotate(90deg); }
      40% { transform: translateY(-50%) scale(0.94) rotate(180deg); }
      60% { transform: translateY(-50%) scale(1.06) rotate(270deg); }
      80% { transform: translateY(-50%) scale(0.98) rotate(330deg); }
      100% { transform: translateY(-50%) scale(1) rotate(360deg); }
    }

    .die-face {
      width: 52px;
      height: 52px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      align-items: center;
      justify-items: center;
    }

    .pip {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #0b1020;
      opacity: 0;
    }

    .pip.on { opacity: 1; }

    .coin-face {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 3px solid #c4912f;
      background: radial-gradient(circle at 35% 30%, #fff0a8, #f4bf48 45%, #c98522 100%);
      color: #3a2508;
      font-size: 1.35rem;
      font-weight: 900;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.18), 0 8px 16px rgba(0,0,0,0.24);
    }

    .roll-badge.flipping {
      opacity: 1;
      background: rgba(10, 14, 28, 0.9);
      perspective: 500px;
    }

    .roll-badge.flipping .coin-face {
      animation: coinFlip 0.32s linear infinite;
    }

    @keyframes coinFlip {
      0% { transform: rotateY(0deg) translateY(0); }
      35% { transform: rotateY(540deg) translateY(-7px); }
      70% { transform: rotateY(900deg) translateY(3px); }
      100% { transform: rotateY(1080deg) translateY(0); }
    }

    .empty-note {
      color: var(--muted);
      text-align: center;
      font-weight: 800;
      padding: 18px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,0.58);
      z-index: 20;
    }

    .modal.show { display: flex; }

    .modal-panel {
      width: min(470px, 100%);
      max-height: 86vh;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .modal-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .field select, .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      outline: none;
    }

    .field textarea {
      width: 100%;
      min-height: 84px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      outline: none;
    }

    .modal-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .modal-btn {
      min-height: 42px;
      padding: 0 16px;
      font-size: 0.84rem;
    }

    .modal-btn.primary {
      background: linear-gradient(180deg, rgba(138,164,255,0.28), rgba(101,214,166,0.14));
    }

    .damage-entry {
      display: grid;
      gap: 14px;
    }

    .damage-source {
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 900;
      text-align: center;
    }

    .damage-preview {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .damage-preview .pill {
      display: grid;
      place-items: center;
      min-height: 56px;
      border-radius: 14px;
      text-align: center;
      white-space: normal;
    }

    .damage-stepper {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .damage-stepper .life-btn {
      min-height: 48px;
      font-size: 1rem;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
    }

    .history-item button {
      width: 100%;
      border: 0;
      padding: 0;
      color: inherit;
      background: transparent;
      text-align: left;
      font-weight: 800;
    }

    .history-details {
      display: none;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .history-item.expanded .history-details { display: block; }

    .history-notes-editor {
      display: grid;
      justify-items: center;
      gap: 8px;
      margin: 10px auto;
      max-width: 340px;
    }

    .history-notes-editor .field {
      width: 100%;
      text-align: center;
    }

    .history-notes-editor textarea {
      min-height: 70px;
      text-align: center;
    }

    .history-notes-editor .modal-btn {
      width: auto;
      min-height: 34px;
      padding: 0 14px;
      font-size: 0.76rem;
      text-align: center;
    }

    .log-list {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .log-entry {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-radius: 10px;
      padding: 7px 8px;
      background: rgba(255,255,255,0.04);
    }

    .log-entry .good { color: var(--good); font-weight: 900; }
    .log-entry .danger { color: var(--danger); font-weight: 900; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .toggle-row input {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    .ranking-list {
      display: grid;
      gap: 10px;
    }

    .ranking-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      color: inherit;
      text-align: left;
    }

    button.ranking-item {
      cursor: pointer;
    }

    button.ranking-item:active {
      transform: scale(0.99);
    }

    .ranking-place {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: var(--text);
      background: rgba(138,164,255,0.18);
      font-weight: 900;
    }

    .ranking-name {
      min-width: 0;
      color: var(--text);
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ranking-meta {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .ranking-rating {
      color: var(--warn);
      font-size: 1.05rem;
      font-weight: 900;
    }

    .ranking-detail-head {
      display: grid;
      gap: 8px;
      text-align: center;
      margin-bottom: 12px;
    }

    .ranking-detail-rating {
      color: var(--warn);
      font-size: 2rem;
      line-height: 1;
      font-weight: 900;
    }

    .match-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .delete-match-btn {
      border: 1px solid rgba(255, 107, 129, 0.45);
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--danger);
      background: rgba(255, 107, 129, 0.1);
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .history-delete-btn {
      margin-top: 10px;
    }

    @media (max-width: 720px) {
      .app-bar { grid-template-columns: repeat(5, minmax(0, auto)); }
      .status { grid-column: 1 / -1; grid-row: 2; width: 100%; }
      .toolbar-btn { min-height: 38px; padding: 0 10px; font-size: 0.78rem; }
      body:not(.is-multiplayer) { overflow-y: auto; }
      body:not(.is-multiplayer) .table.duel {
        height: auto;
        min-height: 0;
        grid-template-rows: auto auto;
        overflow: visible;
      }
      .table.duel .player-card { min-height: 330px; }
      .table.multiplayer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: auto;
        align-content: start;
        gap: 8px;
        padding: 8px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .table.multiplayer .player-card { min-height: 330px; }
      .player-card { padding: 10px; gap: 7px; border-radius: 18px; }
      .name { padding: 8px 10px; font-size: 0.72rem; }
      .chip-btn { min-width: 42px; min-height: 32px; padding: 0 8px; font-size: 0.7rem; }
      .life-btn { min-height: 40px; font-size: 1rem; border-radius: 12px; }
      .controls {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }
      .damage-stepper { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .pill { font-size: 0.58rem; padding: 5px 7px; }
    }

    @media (min-width: 721px) and (max-aspect-ratio: 1 / 1) {
      .table.multiplayer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: auto;
        align-content: start;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .table.multiplayer .player-card { min-height: 340px; }
    }

    @media (max-height: 680px) {
      .app-bar { padding-top: 7px; padding-bottom: 7px; }
      .table { gap: 7px; padding: 7px; }
      .player-card { padding: 9px; gap: 6px; }
      .life { font-size: clamp(2.6rem, 12vh, 4.8rem); }
      .life-btn { min-height: 36px; }
      .counter-row, .commander-row { display: none; }
      .multiplayer .counter-row, .multiplayer .commander-row { display: flex; }
      body:not(.is-multiplayer) { overflow-y: auto; }
      body:not(.is-multiplayer) .table.duel {
        height: auto;
        min-height: 0;
        grid-template-rows: auto auto;
        overflow: visible;
      }
      .table.duel .player-card { min-height: 300px; }
    }
  </style>
</head>
<body>
  <header class="app-bar">
    <button class="toolbar-btn" id="setupButton" type="button">Setup</button>
    <button class="toolbar-btn" id="undoButton" type="button">Undo</button>
    <div class="status" id="statusText"></div>
    <button class="toolbar-btn" id="historyButton" type="button">History</button>
    <button class="toolbar-btn" id="rankingButton" type="button">Ranking</button>
    <button class="toolbar-btn" id="newGameButton" type="button">End Game</button>
  </header>

  <main class="table" id="table" aria-label="Life counter table"></main>
  <datalist id="knownPlayerNames"></datalist>

  <div class="modal" id="setupModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">Game Setup</h2>
      <form class="field-grid" id="setupForm">
        <div class="field">
          <label for="modeInput">Format</label>
          <select id="modeInput">
            <option value="duel">Regular</option>
            <option value="commander">Commander</option>
          </select>
        </div>
        <div class="field">
          <label for="playersInput">Players</label>
          <select id="playersInput">
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
            <option value="4">4 Players</option>
          </select>
        </div>
        <div class="field">
          <label for="lifeInput">Starting Life</label>
          <input id="lifeInput" type="number" min="1" max="999" step="1" />
        </div>
        <div class="modal-actions">
          <button class="modal-btn primary" type="submit">Apply</button>
          <button class="modal-btn" id="setupClose" type="button">Close</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="historyModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">Game History</h2>
      <div class="history-list" id="historyList"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="historyClose" type="button">Close</button>
        <button class="modal-btn" id="historyClear" type="button">Clear History</button>
      </div>
    </div>
  </div>

  <div class="modal" id="rankingModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">Ranking</h2>
      <div class="ranking-list" id="rankingList"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="rankingReset" type="button">Reset Elo</button>
        <button class="modal-btn" id="rankingClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <div class="modal" id="endGameModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">End Game</h2>
      <form class="field-grid" id="endGameForm">
        <div class="field">
          <label for="winnerInput">Winner</label>
          <select id="winnerInput"></select>
        </div>
        <div class="field-grid" id="endGameNameFields"></div>
        <label class="toggle-row">
          <input id="rankedGameInput" type="checkbox" />
          Record as ranked game
        </label>
        <div class="field">
          <label for="matchNotesInput">Match Notes</label>
          <textarea id="matchNotesInput" rows="3" placeholder="Decks, win condition, matchup notes"></textarea>
        </div>
        <div class="modal-actions">
          <button class="modal-btn primary" type="submit">End Game</button>
          <button class="modal-btn" id="endGameClose" type="button">Close</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="choiceModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title" id="choiceTitle">Choose</h2>
      <div class="field-grid" id="choiceOptions"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="choiceClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <div class="modal" id="commanderModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">Commander Damage</h2>
      <div class="damage-entry">
        <div class="damage-source" id="commanderSourceLabel"></div>
        <div class="field">
          <label for="commanderTargetInput">Taking Damage</label>
          <select id="commanderTargetInput"></select>
        </div>
        <div class="damage-preview">
          <span class="pill" id="commanderCurrentTotal">Current 0</span>
          <span class="pill warn" id="commanderPendingAmount">Change +0</span>
          <span class="pill" id="commanderNewTotal">New 0</span>
        </div>
        <div class="damage-stepper">
          <button class="life-btn minus" type="button" data-commander-step="-10">-10</button>
          <button class="life-btn minus" type="button" data-commander-step="-5">-5</button>
          <button class="life-btn minus" type="button" data-commander-step="-1">-1</button>
          <button class="life-btn plus" type="button" data-commander-step="1">+1</button>
          <button class="life-btn plus" type="button" data-commander-step="5">+5</button>
          <button class="life-btn plus" type="button" data-commander-step="10">+10</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn primary" id="commanderConfirm" type="button">Confirm</button>
        <button class="modal-btn" id="commanderClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    const STATE_KEY = 'mtg-life-state-v3';
    const HISTORY_KEY = 'mtg-game-history-v2';
    const RANKINGS_KEY = 'mtg-elo-rankings-v1';
    const MAX_HISTORY = 75;
    const MAX_UNDO = 40;
    const STARTING_ELO = 1200;
    const ELO_K = 32;

    const defaults = {
      settings: { mode: 'duel', playerCount: 2, startingLife: 20 },
      currentGameStartedAt: new Date().toISOString(),
      players: [],
      log: [],
      undoStack: []
    };

    const els = {
      table: document.getElementById('table'),
      knownPlayerNames: document.getElementById('knownPlayerNames'),
      statusText: document.getElementById('statusText'),
      setupButton: document.getElementById('setupButton'),
      undoButton: document.getElementById('undoButton'),
      historyButton: document.getElementById('historyButton'),
      rankingButton: document.getElementById('rankingButton'),
      newGameButton: document.getElementById('newGameButton'),
      setupModal: document.getElementById('setupModal'),
      setupForm: document.getElementById('setupForm'),
      setupClose: document.getElementById('setupClose'),
      modeInput: document.getElementById('modeInput'),
      playersInput: document.getElementById('playersInput'),
      lifeInput: document.getElementById('lifeInput'),
      historyModal: document.getElementById('historyModal'),
      historyList: document.getElementById('historyList'),
      historyClose: document.getElementById('historyClose'),
      historyClear: document.getElementById('historyClear'),
      rankingModal: document.getElementById('rankingModal'),
      rankingList: document.getElementById('rankingList'),
      rankingReset: document.getElementById('rankingReset'),
      rankingClose: document.getElementById('rankingClose'),
      endGameModal: document.getElementById('endGameModal'),
      endGameForm: document.getElementById('endGameForm'),
      winnerInput: document.getElementById('winnerInput'),
      endGameNameFields: document.getElementById('endGameNameFields'),
      rankedGameInput: document.getElementById('rankedGameInput'),
      matchNotesInput: document.getElementById('matchNotesInput'),
      endGameClose: document.getElementById('endGameClose'),
      choiceModal: document.getElementById('choiceModal'),
      choiceTitle: document.getElementById('choiceTitle'),
      choiceOptions: document.getElementById('choiceOptions'),
      choiceClose: document.getElementById('choiceClose'),
      commanderModal: document.getElementById('commanderModal'),
      commanderSourceLabel: document.getElementById('commanderSourceLabel'),
      commanderTargetInput: document.getElementById('commanderTargetInput'),
      commanderCurrentTotal: document.getElementById('commanderCurrentTotal'),
      commanderPendingAmount: document.getElementById('commanderPendingAmount'),
      commanderNewTotal: document.getElementById('commanderNewTotal'),
      commanderConfirm: document.getElementById('commanderConfirm'),
      commanderClose: document.getElementById('commanderClose')
    };

    const deltaTimers = {};
    const deltaTotals = {};
    const pendingLifeChanges = {};
    const rollTimers = {};
    const rollAnimationTimers = {};
    const rollIntervals = {};
    const coinIntervals = {};
    const commanderEntry = {
      sourceId: null,
      targetId: null,
      amount: 0
    };
    const diceLayouts = {
      1: [4],
      2: [0, 8],
      3: [0, 4, 8],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };

    function makePlayer(index, startingLife, previous) {
      return {
        id: previous?.id || `p${index}`,
        name: previous?.name || `Player ${index}`,
        life: Number.isFinite(previous?.life) ? previous.life : startingLife,
        stats: {
          damageTaken: previous?.stats?.damageTaken || 0,
          lifeGained: previous?.stats?.lifeGained || 0
        },
        poison: previous?.poison || 0,
        commanderDamage: previous?.commanderDamage || {},
        eliminated: Boolean(previous?.eliminated)
      };
    }

    function createPlayers(count, startingLife, previous = []) {
      return Array.from({ length: count }, (_, index) => makePlayer(index + 1, startingLife, previous[index]));
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function normalizeState(rawState) {
      if (!rawState) {
        const fresh = clone(defaults);
        fresh.players = createPlayers(2, 20);
        return fresh;
      }

      if (!rawState.players && ('life1' in rawState || 'life2' in rawState)) {
        return {
          settings: { mode: 'duel', playerCount: 2, startingLife: 20 },
          currentGameStartedAt: rawState.currentGameStartedAt || new Date().toISOString(),
          players: [
            makePlayer(1, 20, { name: rawState.name1, life: rawState.life1, stats: rawState.stats?.[1] }),
            makePlayer(2, 20, { name: rawState.name2, life: rawState.life2, stats: rawState.stats?.[2] })
          ],
          log: Array.isArray(rawState.log) ? rawState.log : [],
          undoStack: []
        };
      }

      const settings = {
        ...defaults.settings,
        ...(rawState.settings || {})
      };
      settings.playerCount = Math.min(4, Math.max(2, Number(settings.playerCount) || 2));
      settings.startingLife = Math.min(999, Math.max(1, Number(settings.startingLife) || 20));
      if (!['duel', 'commander'].includes(settings.mode)) settings.mode = 'duel';
      if (settings.mode === 'commander' && settings.startingLife === 20) settings.startingLife = 40;

      return {
        settings,
        currentGameStartedAt: rawState.currentGameStartedAt || new Date().toISOString(),
        players: createPlayers(settings.playerCount, settings.startingLife, rawState.players || []),
        log: Array.isArray(rawState.log) ? rawState.log : [],
        undoStack: Array.isArray(rawState.undoStack) ? rawState.undoStack.slice(0, MAX_UNDO) : []
      };
    }

    function loadState() {
      try {
        return normalizeState(JSON.parse(localStorage.getItem(STATE_KEY)));
      } catch {
        return normalizeState(null);
      }
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function loadRankings() {
      try {
        const parsed = JSON.parse(localStorage.getItem(RANKINGS_KEY) || '{"players":{},"matches":[]}');
        return {
          players: parsed && typeof parsed.players === 'object' ? parsed.players : {},
          matches: Array.isArray(parsed?.matches) ? parsed.matches : []
        };
      } catch {
        return { players: {}, matches: [] };
      }
    }

    let state = loadState();
    let history = loadHistory();
    let rankings = loadRankings();

    function save() {
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function saveRankings() {
      localStorage.setItem(RANKINGS_KEY, JSON.stringify(rankings));
    }

    function snapshot() {
      return clone({
        settings: state.settings,
        currentGameStartedAt: state.currentGameStartedAt,
        players: state.players,
        log: state.log
      });
    }

    function pushUndo(label) {
      state.undoStack.unshift({ label, at: new Date().toISOString(), snapshot: snapshot() });
      state.undoStack = state.undoStack.slice(0, MAX_UNDO);
    }

    function undoLast() {
      const entry = state.undoStack.shift();
      if (!entry) return;
      const keepUndo = state.undoStack;
      state = normalizeState(entry.snapshot);
      state.undoStack = keepUndo;
      render();
      save();
    }

    function openModal(modal) {
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal(modal) {
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));
    }

    function findPlayer(id) {
      return state.players.find((player) => player.id === id);
    }

    function formatSigned(value) {
      return value > 0 ? `+${value}` : String(value);
    }

    function isDefaultPlayerName(name) {
      return /^Player \d+$/i.test(String(name).trim());
    }

    function normalizeRankingName(name) {
      return String(name).trim().replace(/\s+/g, ' ');
    }

    function normalizeMatchNotes(notes) {
      return String(notes || '').trim();
    }

    function getRankedPlayerNames() {
      const names = new Map();
      const addName = (name) => {
        const normalized = normalizeRankingName(name);
        if (!normalized || isDefaultPlayerName(normalized)) return;
        names.set(rankingKey(normalized), normalized);
      };

      Object.values(rankings.players || {}).forEach((player) => addName(player.name));
      (rankings.matches || []).forEach((match) => {
        addName(match.winner);
        (match.opponents || []).forEach(addName);
      });

      return Array.from(names.values()).sort((a, b) => a.localeCompare(b));
    }

    function updateKnownPlayerNamesList() {
      els.knownPlayerNames.innerHTML = getRankedPlayerNames()
        .map((name) => `<option value="${escapeHtml(name)}"></option>`)
        .join('');
    }

    function resolveKnownPlayerName(name) {
      const normalized = normalizeRankingName(name);
      const known = getRankedPlayerNames().find((existing) => rankingKey(existing) === rankingKey(normalized));
      return known || normalized;
    }

    function choosePlayerName(currentName, onChoose) {
      updateKnownPlayerNamesList();
      const rankedNames = getRankedPlayerNames();
      els.choiceTitle.textContent = 'Player Name';
      els.choiceOptions.innerHTML = [
        ...rankedNames.map((name) => `
          <button class="modal-btn primary" type="button" data-pick-name="${escapeHtml(name)}">${escapeHtml(name)}</button>
        `),
        '<button class="modal-btn" type="button" data-add-player-name="true">Add New Player</button>'
      ].join('');

      els.choiceOptions.querySelectorAll('[data-pick-name]').forEach((button) => {
        button.addEventListener('click', () => {
          onChoose(button.dataset.pickName);
          closeModal(els.choiceModal);
        });
      });

      const addButton = els.choiceOptions.querySelector('[data-add-player-name]');
      addButton.addEventListener('click', () => {
        const nextName = normalizeRankingName(prompt('New player name', isDefaultPlayerName(currentName) ? '' : currentName) || '');
        if (nextName) onChoose(resolveKnownPlayerName(nextName));
        closeModal(els.choiceModal);
      });

      openModal(els.choiceModal);
    }

    function setPlayerName(playerId, nextName) {
      const player = findPlayer(playerId);
      const normalized = resolveKnownPlayerName(nextName);
      if (!player || !normalized || normalized === player.name) return;
      pushUndo(`rename ${player.name}`);
      player.name = normalized;
      logAction('name', `Renamed player to ${normalized}`, { playerId: player.id });
      render();
      save();
    }

    function rankingKey(name) {
      return normalizeRankingName(name).toLowerCase();
    }

    function getRankingRecord(name) {
      const normalized = normalizeRankingName(name);
      const key = rankingKey(normalized);
      if (!rankings.players[key]) rankings.players[key] = createRankingRecord(normalized);
      return rankings.players[key];
    }

    function expectedScore(playerRating, opponentRating) {
      return 1 / (1 + Math.pow(10, (opponentRating - playerRating) / 400));
    }

    function createRankingRecord(name) {
      return {
        name: normalizeRankingName(name),
        rating: STARTING_ELO,
        wins: 0,
        losses: 0,
        draws: 0,
        games: 0
      };
    }

    function describeSettings() {
      const mode = state.settings.mode === 'commander' ? 'Commander' : 'Regular';
      return `${mode} · ${state.players.length} players · ${state.settings.startingLife} life`;
    }

    function logAction(type, message, details = {}) {
      state.log.push({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        type,
        message,
        details,
        time: new Date().toISOString()
      });
    }

    function commitPendingLifeChange(playerId) {
      const pending = pendingLifeChanges[playerId];
      if (!pending || pending.amount === 0) {
        pendingLifeChanges[playerId] = null;
        return;
      }

      const player = findPlayer(playerId);
      logAction('life', `${pending.playerName || player?.name || 'Player'} ${pending.previousLife} to ${pending.newLife}`, {
        playerId,
        amount: pending.amount,
        previousLife: pending.previousLife,
        newLife: pending.newLife
      });
      pendingLifeChanges[playerId] = null;
      save();
    }

    function commitAllPendingLifeChanges() {
      Object.keys(pendingLifeChanges).forEach(commitPendingLifeChange);
    }

    function showDelta(playerId, amount, label) {
      const badge = document.querySelector(`[data-delta-for="${playerId}"]`);
      if (!badge) return;
      badge.textContent = label || formatSigned(amount);
      badge.className = 'delta-badge show';
      if (amount > 0) badge.classList.add('positive');
      else if (amount < 0) badge.classList.add('negative');
      else badge.classList.add('neutral');
      clearTimeout(deltaTimers[playerId]);
      deltaTimers[playerId] = setTimeout(() => badge.classList.remove('show'), 1400);
    }

    function showAccumulatedLifeDelta(playerId, amount) {
      deltaTotals[playerId] = (deltaTotals[playerId] || 0) + amount;
      showDelta(playerId, deltaTotals[playerId]);
      clearTimeout(deltaTimers[playerId]);
      deltaTimers[playerId] = setTimeout(() => {
        const badge = document.querySelector(`[data-delta-for="${playerId}"]`);
        if (badge) badge.classList.remove('show');
        commitPendingLifeChange(playerId);
        deltaTotals[playerId] = 0;
      }, 3000);
    }

    function renderDieFace(value) {
      const active = new Set(diceLayouts[value] || diceLayouts[1]);
      return `<div class="die-face" aria-label="Rolled ${value}">
        ${Array.from({ length: 9 }, (_, index) => `<span class="pip ${active.has(index) ? 'on' : ''}"></span>`).join('')}
      </div>`;
    }

    function showRoll(playerId, value) {
      const badge = document.querySelector(`[data-roll-for="${playerId}"]`);
      if (!badge) return;
      clearTimeout(rollTimers[playerId]);
      clearTimeout(rollAnimationTimers[playerId]);
      clearInterval(rollIntervals[playerId]);
      clearInterval(coinIntervals[playerId]);
      badge.classList.remove('show', 'rolling', 'flipping', 'coin-result');
      const spinValues = [1, 3, 5, 2, 4, 6];
      let index = 0;
      badge.innerHTML = renderDieFace(spinValues[0]);
      badge.classList.add('rolling');
      rollIntervals[playerId] = setInterval(() => {
        index = (index + 1) % spinValues.length;
        badge.innerHTML = renderDieFace(spinValues[index]);
      }, 90);
      rollAnimationTimers[playerId] = setTimeout(() => {
        clearInterval(rollIntervals[playerId]);
        badge.innerHTML = renderDieFace(value);
        badge.classList.remove('rolling');
        badge.classList.add('show');
        rollTimers[playerId] = setTimeout(() => badge.classList.remove('show'), 2000);
      }, 700);
    }

    function renderCoinFace(value) {
      return `<div class="coin-face" aria-label="${value}">${value === 'Heads' ? 'H' : 'T'}</div>`;
    }

    function showCoinFlip(playerId, value) {
      const badge = document.querySelector(`[data-roll-for="${playerId}"]`);
      if (!badge) return;
      clearTimeout(rollTimers[playerId]);
      clearTimeout(rollAnimationTimers[playerId]);
      clearInterval(rollIntervals[playerId]);
      clearInterval(coinIntervals[playerId]);
      badge.classList.remove('show', 'rolling', 'flipping', 'coin-result');
      const faces = ['Heads', 'Tails'];
      let index = 0;
      badge.innerHTML = renderCoinFace(faces[index]);
      badge.classList.add('flipping');
      coinIntervals[playerId] = setInterval(() => {
        index = (index + 1) % faces.length;
        badge.innerHTML = renderCoinFace(faces[index]);
      }, 90);
      rollAnimationTimers[playerId] = setTimeout(() => {
        clearInterval(coinIntervals[playerId]);
        badge.innerHTML = renderCoinFace(value);
        badge.classList.remove('flipping');
        badge.classList.add('show', 'coin-result');
        rollTimers[playerId] = setTimeout(() => badge.classList.remove('show'), 2000);
      }, 900);
    }

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function isAngel(player) {
      return player.name.trim().toLowerCase() === 'angel';
    }

    function catBlessing(playerId) {
      if (state.players.length !== 2) return;

      const angel = findPlayer(playerId);
      if (!angel || !isAngel(angel)) return;

      const opponent = state.players.find((player) => player.id !== playerId);
      if (!opponent) return;

      pushUndo(`${angel.name} cat blessing`);

      const angelPreviousLife = pendingLifeChanges[angel.id]?.previousLife ?? angel.life;
      const opponentPreviousLife = pendingLifeChanges[opponent.id]?.previousLife ?? opponent.life;

      angel.life += 1;
      opponent.life -= 1;

      angel.stats.lifeGained += 1;
      opponent.stats.damageTaken += 1;

      pendingLifeChanges[angel.id] = {
        playerId: angel.id,
        playerName: angel.name,
        amount: (pendingLifeChanges[angel.id]?.amount || 0) + 1,
        previousLife: angelPreviousLife,
        newLife: angel.life
      };

      pendingLifeChanges[opponent.id] = {
        playerId: opponent.id,
        playerName: opponent.name,
        amount: (pendingLifeChanges[opponent.id]?.amount || 0) - 1,
        previousLife: opponentPreviousLife,
        newLife: opponent.life
      };

      render();
      save();

      showAccumulatedLifeDelta(angel.id, 1);
      showAccumulatedLifeDelta(opponent.id, -1);

      vibrate([15, 20, 15]);
    }

    function changeLife(playerId, amount) {
      const player = findPlayer(playerId);
      if (!player) return;
      pushUndo(`${player.name} life ${formatSigned(amount)}`);
      const previousLife = pendingLifeChanges[playerId]?.previousLife ?? player.life;
      player.life += amount;
      if (amount < 0) player.stats.damageTaken += Math.abs(amount);
      if (amount > 0) player.stats.lifeGained += amount;
      pendingLifeChanges[playerId] = {
        playerId,
        playerName: player.name,
        amount: (pendingLifeChanges[playerId]?.amount || 0) + amount,
        previousLife,
        newLife: player.life
      };
      render();
      save();
      showAccumulatedLifeDelta(playerId, amount);
      vibrate(10);
    }

    function changePoison(playerId, amount) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      pushUndo(`${player.name} poison ${formatSigned(amount)}`);
      player.poison = Math.max(0, player.poison + amount);
      logAction('poison', `${player.name} poison ${formatSigned(amount)}`, { playerId, amount, poison: player.poison });
      render();
      save();
      showDelta(playerId, amount, `${player.poison} poison`);
      vibrate(10);
    }

    function changeCommanderDamage(targetId, sourceId, amount) {
      const target = findPlayer(targetId);
      const source = findPlayer(sourceId);
      if (!target || !source || targetId === sourceId) return;
      commitAllPendingLifeChanges();
      pushUndo(`${source.name} commander damage to ${target.name}`);
      target.commanderDamage[sourceId] = Math.max(0, (target.commanderDamage[sourceId] || 0) + amount);
      const total = target.commanderDamage[sourceId];
      logAction('commander', `${source.name} dealt commander damage to ${target.name}`, {
        targetId,
        sourceId,
        amount,
        total
      });
      render();
      save();
      showDelta(targetId, amount, `${total} cmdr`);
      vibrate(10);
    }

    function toggleEliminated(playerId) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      pushUndo(`${player.name} eliminated`);
      player.eliminated = !player.eliminated;
      logAction('eliminated', `${player.name} ${player.eliminated ? 'eliminated' : 'returned'}`, { playerId, eliminated: player.eliminated });
      render();
      save();
    }

    function rollDie(playerId) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      const value = Math.floor(Math.random() * 6) + 1;
      logAction('roll', `${player.name} rolled ${value}`, { playerId, value });
      showRoll(playerId, value);
      save();
      vibrate([15, 20, 15]);
    }

    function flipCoin(playerId) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      const value = Math.random() < 0.5 ? 'Heads' : 'Tails';
      logAction('coin', `${player.name} flipped ${value}`, { playerId, value });
      showCoinFlip(playerId, value);
      save();
      vibrate([18, 24, 18]);
    }

    function hasActivity() {
      return state.players.some((player) =>
        player.life !== state.settings.startingLife ||
        player.stats.damageTaken ||
        player.stats.lifeGained ||
        player.poison ||
        Object.values(player.commanderDamage || {}).some(Boolean) ||
        player.eliminated
      ) || state.log.length;
    }

    function makeGameRecord() {
      commitAllPendingLifeChanges();
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        settings: clone(state.settings),
        startedAt: state.currentGameStartedAt,
        endedAt: new Date().toISOString(),
        players: clone(state.players),
        log: clone(state.log)
      };
    }

    function applyRankedResult(resultId, notes = '') {
      const changes = [];
      const matchId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      const isDraw = resultId === 'draw';
      const matchNotes = normalizeMatchNotes(notes);

      if (isDraw) {
        state.players.forEach((player) => getRankingRecord(player.name));
        for (let i = 0; i < state.players.length; i += 1) {
          for (let j = i + 1; j < state.players.length; j += 1) {
            const firstRecord = getRankingRecord(state.players[i].name);
            const secondRecord = getRankingRecord(state.players[j].name);
            const firstBefore = firstRecord.rating;
            const secondBefore = secondRecord.rating;
            const firstDelta = Math.round(ELO_K * (0.5 - expectedScore(firstBefore, secondBefore)));
            const secondDelta = Math.round(ELO_K * (0.5 - expectedScore(secondBefore, firstBefore)));

            firstRecord.rating += firstDelta;
            firstRecord.draws = (firstRecord.draws || 0) + 1;
            firstRecord.games += 1;

            secondRecord.rating += secondDelta;
            secondRecord.draws = (secondRecord.draws || 0) + 1;
            secondRecord.games += 1;

            changes.push({
              result: 'draw',
              winner: firstRecord.name,
              opponent: secondRecord.name,
              winnerBefore: firstBefore,
              winnerAfter: firstRecord.rating,
              winnerDelta: firstDelta,
              opponentBefore: secondBefore,
              opponentAfter: secondRecord.rating,
              opponentDelta: secondDelta
            });
          }
        }

        rankings.matches.unshift({
          id: matchId,
          at: new Date().toISOString(),
          result: 'draw',
          winner: null,
          opponents: state.players.map((player) => normalizeRankingName(player.name)),
          notes: matchNotes,
          changes
        });
        rankings.matches = rankings.matches.slice(0, 200);
        saveRankings();
        return { matchId, changes };
      }

      const winner = findPlayer(resultId);
      const opponents = state.players.filter((player) => player.id !== resultId);
      if (!winner || !opponents.length) return null;

      const winnerRecord = getRankingRecord(winner.name);

      opponents.forEach((opponent) => {
        const opponentRecord = getRankingRecord(opponent.name);
        const winnerBefore = winnerRecord.rating;
        const opponentBefore = opponentRecord.rating;
        const winnerDelta = Math.round(ELO_K * (1 - expectedScore(winnerBefore, opponentBefore)));
        const opponentDelta = Math.round(ELO_K * (0 - expectedScore(opponentBefore, winnerBefore)));

        winnerRecord.rating += winnerDelta;
        winnerRecord.wins += 1;
        winnerRecord.games += 1;

        opponentRecord.rating += opponentDelta;
        opponentRecord.losses += 1;
        opponentRecord.games += 1;

        changes.push({
          result: 'win',
          winner: winnerRecord.name,
          opponent: opponentRecord.name,
          winnerBefore,
          winnerAfter: winnerRecord.rating,
          winnerDelta,
          opponentBefore,
          opponentAfter: opponentRecord.rating,
          opponentDelta
        });
      });

      rankings.matches.unshift({
        id: matchId,
        at: new Date().toISOString(),
        result: 'win',
        winner: normalizeRankingName(winner.name),
        opponents: opponents.map((player) => normalizeRankingName(player.name)),
        notes: matchNotes,
        changes
      });
      rankings.matches = rankings.matches.slice(0, 200);
      saveRankings();
      return { matchId, changes };
    }

    function recomputeRankingsFromMatches() {
      const matches = rankings.matches || [];
      const players = {};

      function recordFor(name) {
        const normalized = normalizeRankingName(name);
        const key = rankingKey(normalized);
        if (!players[key]) players[key] = createRankingRecord(normalized);
        return players[key];
      }

      [...matches].reverse().forEach((match) => {
        if (match.result === 'draw') {
          const names = match.opponents || [];
          const changes = [];
          for (let i = 0; i < names.length; i += 1) {
            for (let j = i + 1; j < names.length; j += 1) {
              const firstRecord = recordFor(names[i]);
              const secondRecord = recordFor(names[j]);
              const firstBefore = firstRecord.rating;
              const secondBefore = secondRecord.rating;
              const firstDelta = Math.round(ELO_K * (0.5 - expectedScore(firstBefore, secondBefore)));
              const secondDelta = Math.round(ELO_K * (0.5 - expectedScore(secondBefore, firstBefore)));

              firstRecord.rating += firstDelta;
              firstRecord.draws = (firstRecord.draws || 0) + 1;
              firstRecord.games += 1;

              secondRecord.rating += secondDelta;
              secondRecord.draws = (secondRecord.draws || 0) + 1;
              secondRecord.games += 1;

              changes.push({
                result: 'draw',
                winner: firstRecord.name,
                opponent: secondRecord.name,
                winnerBefore: firstBefore,
                winnerAfter: firstRecord.rating,
                winnerDelta: firstDelta,
                opponentBefore: secondBefore,
                opponentAfter: secondRecord.rating,
                opponentDelta: secondDelta
              });
            }
          }
          match.changes = changes;
          return;
        }

        const winnerRecord = recordFor(match.winner);
        const changes = [];
        (match.opponents || []).forEach((opponentName) => {
          const opponentRecord = recordFor(opponentName);
          const winnerBefore = winnerRecord.rating;
          const opponentBefore = opponentRecord.rating;
          const winnerDelta = Math.round(ELO_K * (1 - expectedScore(winnerBefore, opponentBefore)));
          const opponentDelta = Math.round(ELO_K * (0 - expectedScore(opponentBefore, winnerBefore)));

          winnerRecord.rating += winnerDelta;
          winnerRecord.wins += 1;
          winnerRecord.games += 1;

          opponentRecord.rating += opponentDelta;
          opponentRecord.losses += 1;
          opponentRecord.games += 1;

          changes.push({
            result: 'win',
            winner: winnerRecord.name,
            opponent: opponentRecord.name,
            winnerBefore,
            winnerAfter: winnerRecord.rating,
            winnerDelta,
            opponentBefore,
            opponentAfter: opponentRecord.rating,
            opponentDelta
          });
        });
        match.changes = changes;
      });

      rankings.players = players;
    }

    function syncHistoryRatingChanges() {
      const matchesById = Object.fromEntries((rankings.matches || []).map((match) => [match.id, match]));
      history = history.map((game) => {
        if (!game.rankingMatchId) return game;
        const match = matchesById[game.rankingMatchId];
        if (!match) return { ...game, ranked: false, ratingChanges: [], rankingMatchId: null };
        return { ...game, ratingChanges: clone(match.changes || []), notes: match.notes ?? game.notes ?? '' };
      });
    }

    function updateHistoryGameNotes(gameId, notes) {
      const nextNotes = normalizeMatchNotes(notes);
      history = history.map((game) => {
        if (game.id !== gameId) return game;
        return { ...game, notes: nextNotes };
      });
      const game = history.find((item) => item.id === gameId);
      if (game?.rankingMatchId) {
        const match = (rankings.matches || []).find((item) => item.id === game.rankingMatchId);
        if (match) {
          match.notes = nextNotes;
          saveRankings();
        }
      }
      saveHistory();
      renderHistory();
    }

    function unrankMatch(matchId, returnPlayerKey, ask = true) {
      const match = (rankings.matches || []).find((item) => item.id === matchId);
      if (!match) return;
      const label = `${match.winner} vs ${(match.opponents || []).join(', ')}`;
      if (ask && !confirm(`Unrank this game: ${label}? It will stay in History, but Elo ratings will be recalculated.`)) return;

      rankings.matches = (rankings.matches || []).filter((item) => item.id !== matchId);
      recomputeRankingsFromMatches();
      syncHistoryRatingChanges();
      saveRankings();
      saveHistory();

      if (rankings.players[returnPlayerKey]) renderPlayerRankingDetail(returnPlayerKey);
      else renderRankings();
    }

    function deleteHistoryGame(gameId) {
      const game = history.find((item) => item.id === gameId);
      if (!game) return;
      const label = game.winnerName ? `${game.winnerName} won` : 'this game';
      if (!confirm(`Delete ${label} from History? This cannot be undone.`)) return;

      if (game.rankingMatchId) {
        rankings.matches = (rankings.matches || []).filter((item) => item.id !== game.rankingMatchId);
        recomputeRankingsFromMatches();
        syncHistoryRatingChanges();
        saveRankings();
      }

      history = history.filter((item) => item.id !== gameId);
      saveHistory();
      renderHistory();
    }

    function resetEloRankings() {
      if (!confirm('Reset all Elo rankings and ranked match records? Game history will stay, but ranked labels will become casual and this cannot be undone.')) return;
      rankings = { players: {}, matches: [] };
      history = history.map((game) => game.ranked
        ? { ...game, ranked: false, ratingChanges: [], rankingMatchId: null }
        : game
      );
      saveRankings();
      saveHistory();
      renderRankings();
    }

    function openEndGame() {
      commitAllPendingLifeChanges();
      els.winnerInput.innerHTML = '<option value="draw">Draw</option>' + state.players.map((player) => (
        `<option value="${escapeHtml(player.id)}">${escapeHtml(player.name)}</option>`
      )).join('');
      els.endGameNameFields.innerHTML = state.players
        .filter((player) => isDefaultPlayerName(player.name))
        .map((player) => `
          <div class="field">
            <label for="name-${escapeHtml(player.id)}">Name for ${escapeHtml(player.name)}</label>
            <input id="name-${escapeHtml(player.id)}" type="text" readonly data-end-name-for="${escapeHtml(player.id)}" placeholder="Select or add player" />
          </div>
        `).join('');
      els.rankedGameInput.checked = false;
      els.matchNotesInput.value = '';
      updateKnownPlayerNamesList();
      els.endGameNameFields.querySelectorAll('[data-end-name-for]').forEach((input) => {
        input.addEventListener('click', () => {
          const player = findPlayer(input.dataset.endNameFor);
          choosePlayerName(player?.name || input.value, (nextName) => {
            input.value = nextName;
          });
        });
      });
      openModal(els.endGameModal);
    }

    function finishEndedGame(event) {
      event.preventDefault();
      const resultId = els.winnerInput.value;
      const isDraw = resultId === 'draw';
      const winner = isDraw ? null : findPlayer(resultId);
      if (!isDraw && !winner) return;

      els.endGameNameFields.querySelectorAll('[data-end-name-for]').forEach((input) => {
        const player = findPlayer(input.dataset.endNameFor);
        const nextName = resolveKnownPlayerName(input.value);
        if (player && nextName) player.name = nextName;
      });

      if (els.rankedGameInput.checked) {
        const missingName = state.players.find((player) => isDefaultPlayerName(player.name));
        if (missingName) {
          alert('Name every default player before recording a ranked game.');
          return;
        }
        const uniqueNames = new Set(state.players.map((player) => rankingKey(player.name)));
        if (uniqueNames.size !== state.players.length) {
          alert('Ranked games need unique player names.');
          return;
        }
      }

      const matchNotes = normalizeMatchNotes(els.matchNotesInput.value);
      const rankedResult = els.rankedGameInput.checked ? applyRankedResult(resultId, matchNotes) : null;
      const record = makeGameRecord();
      record.result = isDraw ? 'draw' : 'win';
      record.winnerId = isDraw ? null : resultId;
      record.winnerName = isDraw ? null : (findPlayer(resultId)?.name || winner.name);
      record.ranked = els.rankedGameInput.checked;
      record.rankingMatchId = rankedResult?.matchId || null;
      record.ratingChanges = rankedResult?.changes || [];
      record.notes = matchNotes;

      if (hasActivity() || record.ranked) {
        history.unshift(record);
        history = history.slice(0, MAX_HISTORY);
        saveHistory();
      }

      resetForNewGame(true);
      closeModal(els.endGameModal);
      render();
      save();
    }

    function resetForNewGame(preserveNames = true) {
      const previous = preserveNames ? state.players.map((player) => ({ id: player.id, name: player.name })) : [];
      state.players = createPlayers(state.settings.playerCount, state.settings.startingLife, previous);
      state.currentGameStartedAt = new Date().toISOString();
      state.log = [];
      state.undoStack = [];
    }

    function applySetup(event) {
      event.preventDefault();
      commitAllPendingLifeChanges();
      const nextSettings = {
        mode: els.modeInput.value,
        playerCount: Number(els.playersInput.value),
        startingLife: Math.min(999, Math.max(1, Number(els.lifeInput.value) || 20))
      };
      const previousPlayers = state.players.map((player) => ({ id: player.id, name: player.name }));
      pushUndo('setup change');
      state.settings = nextSettings;
      state.players = createPlayers(nextSettings.playerCount, nextSettings.startingLife, previousPlayers);
      state.players.forEach((player) => {
        player.commanderDamage = Object.fromEntries(
          Object.entries(player.commanderDamage || {}).filter(([id]) => state.players.some((other) => other.id === id))
        );
      });
      logAction('setup', `Setup changed to ${nextSettings.mode}, ${nextSettings.playerCount} players, ${nextSettings.startingLife} life`);
      closeModal(els.setupModal);
      render();
      save();
    }

    function openSetup() {
      els.modeInput.value = state.settings.mode;
      els.playersInput.value = String(state.settings.playerCount);
      els.lifeInput.value = String(state.settings.startingLife);
      openModal(els.setupModal);
    }

    function getCommanderTargetOptions(sourceId) {
      return state.players.filter((player) => player.id !== sourceId);
    }

    function getCommanderEntryTotal() {
      const target = findPlayer(commanderEntry.targetId);
      if (!target || !commanderEntry.sourceId) return 0;
      return target.commanderDamage?.[commanderEntry.sourceId] || 0;
    }

    function updateCommanderDamagePreview() {
      const current = getCommanderEntryTotal();
      const next = Math.max(0, current + commanderEntry.amount);
      els.commanderCurrentTotal.textContent = `Current ${current}`;
      els.commanderPendingAmount.textContent = `Change ${formatSigned(commanderEntry.amount)}`;
      els.commanderNewTotal.textContent = `New ${next}`;
      els.commanderNewTotal.classList.toggle('danger', next >= 21);
      els.commanderNewTotal.classList.toggle('warn', next >= 15 && next < 21);
      els.commanderConfirm.disabled = commanderEntry.amount === 0;
    }

    function openCommanderDamage(sourceId) {
      const source = findPlayer(sourceId);
      if (!source) return;
      const targets = getCommanderTargetOptions(sourceId);
      commanderEntry.sourceId = sourceId;
      commanderEntry.targetId = targets[0]?.id || null;
      commanderEntry.amount = 0;
      els.commanderSourceLabel.textContent = `${source.name} is dealing commander damage`;
      els.commanderTargetInput.innerHTML = targets.map((target) => (
        `<option value="${escapeHtml(target.id)}">${escapeHtml(target.name)}</option>`
      )).join('');
      updateCommanderDamagePreview();
      openModal(els.commanderModal);
    }

    function adjustCommanderEntry(amount) {
      commanderEntry.amount += amount;
      const current = getCommanderEntryTotal();
      if (current + commanderEntry.amount < 0) commanderEntry.amount = -current;
      updateCommanderDamagePreview();
    }

    function confirmCommanderDamage() {
      if (!commanderEntry.sourceId || !commanderEntry.targetId || commanderEntry.amount === 0) return;
      changeCommanderDamage(commanderEntry.targetId, commanderEntry.sourceId, commanderEntry.amount);
      commanderEntry.sourceId = null;
      commanderEntry.targetId = null;
      commanderEntry.amount = 0;
      closeModal(els.commanderModal);
    }

    function renderCommanderSummary(player) {
      if (state.settings.mode !== 'commander') return '';
      const sources = state.players.filter((source) => source.id !== player.id);
      return `
        <div class="commander-row">
          ${sources.map((source) => {
            const value = player.commanderDamage?.[source.id] || 0;
            const cls = value >= 21 ? 'danger' : value >= 15 ? 'warn' : '';
            return `<span class="pill ${cls}">${escapeHtml(source.name)} ${value}</span>`;
          }).join('')}
        </div>
      `;
    }

    function renderPlayer(player) {
      const eliminated = player.eliminated ? '<span class="pill danger">Eliminated</span>' : '';
      const counterControls = `
        <div class="counter-row">
          <button class="chip-btn" type="button" data-action="poison" data-player="${player.id}" data-amount="1">Poison +</button>
          <button class="chip-btn" type="button" data-action="poison" data-player="${player.id}" data-amount="-1">Poison -</button>
          ${state.settings.mode === 'commander' ? `
            <button class="chip-btn" type="button" data-action="commander" data-player="${player.id}">Cmdr DMG</button>
            <button class="chip-btn" type="button" data-action="eliminate" data-player="${player.id}">${player.eliminated ? 'Return' : 'Out'}</button>
          ` : ''}
        </div>
      `;

      return `
        <article class="player-card ${player.eliminated ? 'is-eliminated' : ''}">
          <div class="player-head">
            <button class="name" type="button" data-name-for="${player.id}" aria-label="${escapeHtml(player.name)} name">${escapeHtml(player.name)}</button>
            <div class="head-actions">
              <button class="chip-btn" type="button" data-action="roll" data-player="${player.id}">d6</button>
              <button class="chip-btn" type="button" data-action="coin" data-player="${player.id}">Flip</button>
            </div>
          </div>
          <div class="life-zone">
            <div class="life-label">Life</div>
            <div class="life" aria-live="polite">${player.life}</div>
            <div class="stat-row">
              <span class="pill danger">Damage ${player.stats.damageTaken}</span>
              <span class="pill good">Gained ${player.stats.lifeGained}</span>
              <span class="pill warn">Poison ${player.poison}</span>
              ${eliminated}
            </div>
            ${renderCommanderSummary(player)}
            <div class="delta-badge" data-delta-for="${player.id}" aria-live="polite"></div>
            <div class="roll-badge" data-roll-for="${player.id}" aria-live="polite"></div>
          </div>
          <div>
            <div class="controls">
              <button class="life-btn minus" type="button" data-action="life" data-player="${player.id}" data-amount="-5">-5</button>
              <button class="life-btn minus" type="button" data-action="life" data-player="${player.id}" data-amount="-1">-1</button>
              <button class="life-btn plus" type="button" data-action="life" data-player="${player.id}" data-amount="1">+1</button>
              <button class="life-btn plus" type="button" data-action="life" data-player="${player.id}" data-amount="5">+5</button>
              ${isAngel(player) && state.players.length === 2 ? `
                <button class="cat-btn" type="button" data-action="cat" data-player="${player.id}">
                  <img src="cauldron-familiar-cat.png" alt="" />
                  <span>+1/-1</span>
                </button>
              ` : ''}
            </div>
            ${counterControls}
          </div>
        </article>
      `;
    }

    function render() {
      els.table.className = `table ${state.players.length === 2 ? 'duel' : 'multiplayer'}`;
      document.body.classList.toggle('is-multiplayer', state.players.length > 2);
      document.body.classList.toggle('is-duel-scroll', state.players.length === 2 && window.innerHeight < 760);
      els.table.innerHTML = state.players.map(renderPlayer).join('');
      els.statusText.textContent = describeSettings();
      els.undoButton.disabled = !state.undoStack.length;
      updateKnownPlayerNamesList();
      bindNameEditors();
    }

    function bindNameEditors() {
      els.table.querySelectorAll('[data-name-for]').forEach((el) => {
        el.addEventListener('click', () => {
          const player = findPlayer(el.dataset.nameFor);
          if (!player) return;
          choosePlayerName(player.name, (nextName) => {
            setPlayerName(player.id, nextName);
          });
        });
      });
    }

    function formatShortDate(value) {
      return new Date(value).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function renderLog(log) {
      if (!log.length) return '<div class="empty-note">No actions recorded yet.</div>';
      return `<div class="log-list">${log.slice(-18).reverse().map((entry) => `
        <div class="log-entry">
          <span>${escapeHtml(entry.message)}</span>
          <span class="${entry.details?.amount > 0 ? 'good' : entry.details?.amount < 0 ? 'danger' : ''}">
            ${typeof entry.details?.amount === 'number' ? formatSigned(entry.details.amount) : formatShortDate(entry.time)}
          </span>
        </div>
      `).join('')}</div>`;
    }

    function renderRatingChanges(changes) {
      if (!changes?.length) return '';
      return `<div class="log-list">${changes.map((change) => `
        <div class="log-entry">
          <span>${change.result === 'draw'
            ? `${escapeHtml(change.winner)} drew ${escapeHtml(change.opponent)}`
            : `${escapeHtml(change.winner)} beat ${escapeHtml(change.opponent)}`}</span>
          <span class="good">${formatSigned(change.winnerDelta)}</span>
        </div>
        <div class="log-entry">
          <span>${escapeHtml(change.opponent)}</span>
          <span class="danger">${formatSigned(change.opponentDelta)}</span>
        </div>
      `).join('')}</div>`;
    }

    function renderHistoryCard(game, title, canDelete = false) {
      const players = game.players.map((player) => `${escapeHtml(player.name)} ${player.life}`).join(' · ');
      const mode = game.settings?.mode === 'commander' ? 'Commander' : 'Regular';
      const result = game.result === 'draw'
        ? `Draw · ${game.ranked ? 'Ranked' : 'Casual'}`
        : game.winnerName ? `Winner ${escapeHtml(game.winnerName)} · ${game.ranked ? 'Ranked' : 'Casual'}` : '';
      return `
        <div class="history-item">
          <button type="button" data-action="expand-history">
            ${escapeHtml(title)}: ${players}
          </button>
          <div class="history-details">
            ${mode} · ${game.players.length} players · ${formatShortDate(game.startedAt)} to ${formatShortDate(game.endedAt)}
            ${result ? `<br>${result}` : ''}
            ${canDelete ? `
              <div class="history-notes-editor">
                <div class="field">
                  <label for="notes-${escapeHtml(game.id)}">Match Notes</label>
                  <textarea id="notes-${escapeHtml(game.id)}" rows="3" data-history-notes="${escapeHtml(game.id)}" placeholder="Decks, win condition, matchup notes">${escapeHtml(game.notes || '')}</textarea>
                </div>
                <button class="modal-btn primary" type="button" data-save-notes="${escapeHtml(game.id)}">Save Notes</button>
              </div>
            ` : game.notes ? `<div class="history-details">${escapeHtml(game.notes)}</div>` : ''}
            ${renderRatingChanges(game.ratingChanges)}
            ${renderLog(game.log || [])}
            ${canDelete ? `<button class="delete-match-btn history-delete-btn" type="button" data-delete-history="${escapeHtml(game.id)}">Delete History Game</button>` : ''}
          </div>
        </div>
      `;
    }

    function renderHistory() {
      commitAllPendingLifeChanges();
      const current = {
        settings: state.settings,
        startedAt: state.currentGameStartedAt,
        endedAt: new Date().toISOString(),
        players: state.players,
        log: state.log
      };
      const completed = history.length
        ? history.map((game, index) => renderHistoryCard(game, `Game ${history.length - index}`, true)).join('')
        : '<div class="history-item"><strong>No completed games yet</strong><div class="history-details">Press End Game after tracking a game to save it here.</div></div>';

      els.historyList.innerHTML = renderHistoryCard(current, 'Current Game') + completed;
      els.historyList.querySelectorAll('[data-action="expand-history"]').forEach((button) => {
        button.addEventListener('click', () => button.closest('.history-item').classList.toggle('expanded'));
      });
      els.historyList.querySelectorAll('[data-delete-history]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          deleteHistoryGame(button.dataset.deleteHistory);
        });
      });
      els.historyList.querySelectorAll('[data-save-notes]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const input = Array.from(els.historyList.querySelectorAll('[data-history-notes]'))
            .find((item) => item.dataset.historyNotes === button.dataset.saveNotes);
          updateHistoryGameNotes(button.dataset.saveNotes, input?.value || '');
        });
      });
    }

    function renderRankings() {
      const rankedPlayers = Object.values(rankings.players || {})
        .sort((a, b) => b.rating - a.rating || a.name.localeCompare(b.name));

      if (!rankedPlayers.length) {
        els.rankingList.innerHTML = '<div class="empty-note">No ranked games recorded yet.</div>';
        return;
      }

      els.rankingList.innerHTML = rankedPlayers.map((player, index) => `
        <button class="ranking-item" type="button" data-ranking-player="${escapeHtml(rankingKey(player.name))}">
          <div class="ranking-place">${index + 1}</div>
          <div>
            <div class="ranking-name">${escapeHtml(player.name)}</div>
            <div class="ranking-meta">${player.wins || 0}W ${player.losses || 0}L ${player.draws || 0}D · ${player.games || 0} games</div>
          </div>
          <div class="ranking-rating">${Math.round(player.rating)}</div>
        </button>
      `).join('');

      els.rankingList.querySelectorAll('[data-ranking-player]').forEach((button) => {
        button.addEventListener('click', () => renderPlayerRankingDetail(button.dataset.rankingPlayer));
      });
    }

    function getPlayerMatchRows(playerKey) {
      return (rankings.matches || []).flatMap((match) => {
        return (match.changes || []).flatMap((change) => {
          const rows = [];
          if (rankingKey(change.winner) === playerKey) {
            rows.push({
              matchId: match.id,
              at: match.at,
              notes: match.notes || '',
              result: change.result === 'draw' ? 'Draw' : 'Win',
              opponent: change.opponent,
              delta: change.winnerDelta,
              before: change.winnerBefore,
              after: change.winnerAfter
            });
          }
          if (rankingKey(change.opponent) === playerKey) {
            rows.push({
              matchId: match.id,
              at: match.at,
              notes: match.notes || '',
              result: change.result === 'draw' ? 'Draw' : 'Loss',
              opponent: change.winner,
              delta: change.opponentDelta,
              before: change.opponentBefore,
              after: change.opponentAfter
            });
          }
          return rows;
        });
      });
    }

    function renderPlayerRankingDetail(playerKey) {
      const player = rankings.players[playerKey];
      if (!player) return;
      const rows = getPlayerMatchRows(playerKey);
      const matchList = rows.length
        ? `<div class="log-list">${rows.map((row) => `
          <div class="log-entry match-row">
            <div>
              <div>${row.result} vs ${escapeHtml(row.opponent)} · ${formatShortDate(row.at)}</div>
              <div class="ranking-meta">${Math.round(row.before)} to ${Math.round(row.after)}</div>
              ${row.notes ? `<div class="ranking-meta">${escapeHtml(row.notes)}</div>` : ''}
            </div>
            <span class="${row.delta >= 0 ? 'good' : 'danger'}">${formatSigned(row.delta)}</span>
          </div>
          <button class="delete-match-btn" type="button" data-unrank-match="${escapeHtml(row.matchId)}">Unrank Game</button>
        `).join('')}</div>`
        : '<div class="empty-note">No ranked match history yet.</div>';

      els.rankingList.innerHTML = `
        <div class="ranking-detail-head">
          <div class="ranking-name">${escapeHtml(player.name)}</div>
          <div class="ranking-detail-rating">${Math.round(player.rating)}</div>
          <div class="ranking-meta">${player.wins || 0}W ${player.losses || 0}L ${player.draws || 0}D · ${player.games || 0} games</div>
        </div>
        ${matchList}
        <div class="modal-actions">
          <button class="modal-btn" type="button" id="rankingBack">Back</button>
        </div>
      `;
      document.getElementById('rankingBack').addEventListener('click', renderRankings);
      els.rankingList.querySelectorAll('[data-unrank-match]').forEach((button) => {
        button.addEventListener('click', () => unrankMatch(button.dataset.unrankMatch, playerKey));
      });
    }

    function bindEvents() {
      els.table.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const playerId = button.dataset.player;
        const amount = Number(button.dataset.amount || 0);
        if (button.dataset.action === 'life') changeLife(playerId, amount);
        if (button.dataset.action === 'poison') changePoison(playerId, amount);
        if (button.dataset.action === 'commander') openCommanderDamage(playerId);
        if (button.dataset.action === 'eliminate') toggleEliminated(playerId);
        if (button.dataset.action === 'roll') rollDie(playerId);
        if (button.dataset.action === 'coin') flipCoin(playerId);
        if (button.dataset.action === 'cat') catBlessing(playerId);
      });

      els.setupButton.addEventListener('click', openSetup);
      els.setupForm.addEventListener('submit', applySetup);
      els.setupClose.addEventListener('click', () => closeModal(els.setupModal));
      els.setupModal.addEventListener('click', (event) => { if (event.target === els.setupModal) closeModal(els.setupModal); });

      els.modeInput.addEventListener('change', () => {
        if (els.modeInput.value === 'commander') {
          els.lifeInput.value = els.lifeInput.value === '20' ? '40' : els.lifeInput.value;
          els.playersInput.value = Number(els.playersInput.value) < 3 ? '4' : els.playersInput.value;
        } else {
          els.lifeInput.value = '20';
          els.playersInput.value = '2';
        }
      });

      els.undoButton.addEventListener('click', undoLast);
      els.newGameButton.addEventListener('click', openEndGame);
      els.endGameForm.addEventListener('submit', finishEndedGame);
      els.endGameClose.addEventListener('click', () => closeModal(els.endGameModal));
      els.endGameModal.addEventListener('click', (event) => { if (event.target === els.endGameModal) closeModal(els.endGameModal); });

      els.historyButton.addEventListener('click', () => {
        renderHistory();
        openModal(els.historyModal);
      });
      els.historyClose.addEventListener('click', () => closeModal(els.historyModal));
      els.historyModal.addEventListener('click', (event) => { if (event.target === els.historyModal) closeModal(els.historyModal); });
      els.historyClear.addEventListener('click', () => {
        history = [];
        saveHistory();
        renderHistory();
      });

      els.rankingButton.addEventListener('click', () => {
        renderRankings();
        openModal(els.rankingModal);
      });
      els.rankingReset.addEventListener('click', resetEloRankings);
      els.rankingClose.addEventListener('click', () => closeModal(els.rankingModal));
      els.rankingModal.addEventListener('click', (event) => { if (event.target === els.rankingModal) closeModal(els.rankingModal); });

      els.choiceClose.addEventListener('click', () => closeModal(els.choiceModal));
      els.choiceModal.addEventListener('click', (event) => { if (event.target === els.choiceModal) closeModal(els.choiceModal); });

      els.commanderTargetInput.addEventListener('change', () => {
        commanderEntry.targetId = els.commanderTargetInput.value;
        commanderEntry.amount = 0;
        updateCommanderDamagePreview();
      });
      els.commanderModal.querySelectorAll('[data-commander-step]').forEach((button) => {
        button.addEventListener('click', () => adjustCommanderEntry(Number(button.dataset.commanderStep)));
      });
      els.commanderConfirm.addEventListener('click', confirmCommanderDamage);
      els.commanderClose.addEventListener('click', () => closeModal(els.commanderModal));
      els.commanderModal.addEventListener('click', (event) => { if (event.target === els.commanderModal) closeModal(els.commanderModal); });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          [els.setupModal, els.historyModal, els.rankingModal, els.endGameModal, els.choiceModal, els.commanderModal].forEach(closeModal);
        }
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'z') {
          event.preventDefault();
          undoLast();
        }
      });

      window.addEventListener('resize', render);
    }

    function runSelfTests() {
      console.assert(state.players.length >= 2, 'Expected at least two players');
      console.assert(typeof changeLife === 'function', 'Expected changeLife function');
      console.assert(typeof undoLast === 'function', 'Expected undo function');
      console.assert(typeof catBlessing === 'function', 'Expected cat blessing function');
      console.assert(typeof applyRankedResult === 'function', 'Expected ranked result function');
      console.assert(Array.isArray(state.undoStack), 'Undo stack should be an array');
      console.assert(Array.isArray(history), 'History should be an array');
      console.assert(rankings && typeof rankings.players === 'object', 'Rankings should be loaded');
      console.assert(escapeHtml('<x>') === '&lt;x&gt;', 'escapeHtml should encode angle brackets');
    }

    render();
    bindEvents();
    runSelfTests();
    save();
  </script>
</body>
</html>
