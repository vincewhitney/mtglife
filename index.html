<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MTG Life Counter</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 25, 45, 0.94);
      --panel-2: rgba(27, 37, 66, 0.94);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7ff;
      --muted: #aab4d6;
      --danger: #ff6b81;
      --good: #65d6a6;
      --warn: #ffd166;
      --accent: #8aa4ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(138, 164, 255, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(101, 214, 166, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    body.is-multiplayer {
      overflow-y: auto;
    }

    body.is-multiplayer .table {
      height: auto;
      min-height: 0;
      overflow: visible;
    }

    body.is-duel-scroll {
      overflow-y: auto;
    }

    body.is-duel-scroll .table.duel {
      height: auto;
      min-height: 0;
      grid-template-rows: auto auto;
      overflow: visible;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; touch-action: manipulation; }

    .app-bar {
      display: grid;
      grid-template-columns: auto auto 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: max(10px, env(safe-area-inset-top)) 12px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 12, 24, 0.78);
      backdrop-filter: blur(12px);
      z-index: 5;
    }

    .status {
      justify-self: center;
      min-width: 0;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar-btn, .modal-btn, .chip-btn {
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      font-weight: 800;
    }

    .toolbar-btn {
      min-height: 40px;
      padding: 0 12px;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .toolbar-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .table {
      min-height: 0;
      height: 100%;
      display: grid;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    .table.duel {
      grid-template-rows: repeat(2, minmax(320px, 1fr));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .table.multiplayer {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: auto;
      align-content: start;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .player-card {
      position: relative;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 9px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
    }

    .multiplayer .player-card {
      min-height: 340px;
      grid-template-rows: auto auto auto;
    }

    .duel .player-card:first-child { transform: rotate(180deg); }

    .player-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .name {
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .head-actions { display: flex; gap: 6px; }

    .chip-btn {
      min-width: 48px;
      min-height: 36px;
      padding: 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .life-zone {
      min-height: 0;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 6px;
      position: relative;
    }

    .life-label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .life {
      border: 0;
      background: transparent;
      color: var(--text);
      width: 100%;
      padding: 0;
      text-align: center;
      font-size: clamp(3.2rem, 15vh, 7rem);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0;
    }

    .multiplayer .life { font-size: clamp(2.8rem, 13vh, 5.8rem); }

    .stat-row, .counter-row, .commander-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 6px 8px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .pill.danger { color: var(--danger); }
    .pill.good { color: var(--good); }
    .pill.warn { color: var(--warn); }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 7px;
    }

    .life-btn {
      min-height: clamp(42px, 8vh, 66px);
      border: 1px solid var(--border);
      border-radius: 15px;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      font-size: 1.15rem;
      font-weight: 900;
    }

    .life-btn.minus { color: var(--danger); }
    .life-btn.plus { color: var(--good); }

    .delta-badge, .roll-badge {
      position: absolute;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transform: translateY(-50%) scale(0.98);
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .delta-badge {
      top: 50%;
      right: 8%;
      min-width: 58px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(10, 14, 28, 0.9);
      text-align: center;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .delta-badge.show, .roll-badge.show {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .delta-badge.positive { color: var(--good); }
    .delta-badge.negative { color: var(--danger); }
    .delta-badge.neutral { color: var(--text); }

    .roll-badge {
      top: 50%;
      left: 8%;
      min-width: 72px;
      min-height: 72px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      padding: 12px;
      background: rgba(245,247,255,0.96);
      color: #0b1020;
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
    }

    .roll-badge.coin-result {
      background: rgba(10, 14, 28, 0.9);
    }

    .roll-badge.coin-result .coin-face {
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.18),
        0 0 18px rgba(255, 209, 102, 0.72),
        0 8px 18px rgba(0,0,0,0.28);
    }

    .roll-badge.rolling {
      opacity: 1;
      animation: diceRoll 0.7s ease;
    }

    @keyframes diceRoll {
      0% { transform: translateY(-50%) scale(0.78) rotate(0deg); }
      20% { transform: translateY(-50%) scale(1.08) rotate(90deg); }
      40% { transform: translateY(-50%) scale(0.94) rotate(180deg); }
      60% { transform: translateY(-50%) scale(1.06) rotate(270deg); }
      80% { transform: translateY(-50%) scale(0.98) rotate(330deg); }
      100% { transform: translateY(-50%) scale(1) rotate(360deg); }
    }

    .die-face {
      width: 52px;
      height: 52px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      align-items: center;
      justify-items: center;
    }

    .pip {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #0b1020;
      opacity: 0;
    }

    .pip.on { opacity: 1; }

    .coin-face {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 3px solid #c4912f;
      background: radial-gradient(circle at 35% 30%, #fff0a8, #f4bf48 45%, #c98522 100%);
      color: #3a2508;
      font-size: 1.35rem;
      font-weight: 900;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.18), 0 8px 16px rgba(0,0,0,0.24);
    }

    .roll-badge.flipping {
      opacity: 1;
      background: rgba(10, 14, 28, 0.9);
      perspective: 500px;
    }

    .roll-badge.flipping .coin-face {
      animation: coinFlip 0.32s linear infinite;
    }

    @keyframes coinFlip {
      0% { transform: rotateY(0deg) translateY(0); }
      35% { transform: rotateY(540deg) translateY(-7px); }
      70% { transform: rotateY(900deg) translateY(3px); }
      100% { transform: rotateY(1080deg) translateY(0); }
    }

    .empty-note {
      color: var(--muted);
      text-align: center;
      font-weight: 800;
      padding: 18px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,0.58);
      z-index: 20;
    }

    .modal.show { display: flex; }

    .modal-panel {
      width: min(470px, 100%);
      max-height: 86vh;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .modal-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .field select, .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      outline: none;
    }

    .modal-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .modal-btn {
      min-height: 42px;
      padding: 0 16px;
      font-size: 0.84rem;
    }

    .modal-btn.primary {
      background: linear-gradient(180deg, rgba(138,164,255,0.28), rgba(101,214,166,0.14));
    }

    .damage-entry {
      display: grid;
      gap: 14px;
    }

    .damage-source {
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 900;
      text-align: center;
    }

    .damage-preview {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .damage-preview .pill {
      display: grid;
      place-items: center;
      min-height: 56px;
      border-radius: 14px;
      text-align: center;
      white-space: normal;
    }

    .damage-stepper {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .damage-stepper .life-btn {
      min-height: 48px;
      font-size: 1rem;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
    }

    .history-item button {
      width: 100%;
      border: 0;
      padding: 0;
      color: inherit;
      background: transparent;
      text-align: left;
      font-weight: 800;
    }

    .history-details {
      display: none;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .history-item.expanded .history-details { display: block; }

    .log-list {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .log-entry {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-radius: 10px;
      padding: 7px 8px;
      background: rgba(255,255,255,0.04);
    }

    .log-entry .good { color: var(--good); font-weight: 900; }
    .log-entry .danger { color: var(--danger); font-weight: 900; }

    @media (max-width: 720px) {
      .app-bar { grid-template-columns: repeat(4, minmax(0, auto)); }
      .status { grid-column: 1 / -1; grid-row: 2; width: 100%; }
      .toolbar-btn { min-height: 38px; padding: 0 10px; font-size: 0.78rem; }
      body:not(.is-multiplayer) {
        overflow-y: auto;
      }
      body:not(.is-multiplayer) .table.duel {
        height: auto;
        min-height: 0;
        grid-template-rows: auto auto;
        overflow: visible;
      }
      .table.duel .player-card {
        min-height: 330px;
      }
      .table.multiplayer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: auto;
        align-content: start;
        gap: 8px;
        padding: 8px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .table.multiplayer .player-card {
        min-height: 330px;
      }
      .player-card { padding: 10px; gap: 7px; border-radius: 18px; }
      .name { padding: 8px 10px; font-size: 0.72rem; }
      .chip-btn { min-width: 42px; min-height: 32px; padding: 0 8px; font-size: 0.7rem; }
      .life-btn { min-height: 40px; font-size: 1rem; border-radius: 12px; }
      .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
      .damage-stepper { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .pill { font-size: 0.58rem; padding: 5px 7px; }
    }

    @media (min-width: 721px) and (max-aspect-ratio: 1 / 1) {
      .table.multiplayer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: auto;
        align-content: start;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .table.multiplayer .player-card {
        min-height: 340px;
      }
    }

    @media (max-height: 680px) {
      .app-bar { padding-top: 7px; padding-bottom: 7px; }
      .table { gap: 7px; padding: 7px; }
      .player-card { padding: 9px; gap: 6px; }
      .life { font-size: clamp(2.6rem, 12vh, 4.8rem); }
      .life-btn { min-height: 36px; }
      .counter-row, .commander-row { display: none; }
      .multiplayer .counter-row, .multiplayer .commander-row { display: flex; }
      body:not(.is-multiplayer) {
        overflow-y: auto;
      }
      body:not(.is-multiplayer) .table.duel {
        height: auto;
        min-height: 0;
        grid-template-rows: auto auto;
        overflow: visible;
      }
      .table.duel .player-card {
        min-height: 300px;
      }
    }
.cat-btn {
  grid-column: 1 / -1;
  min-height: 44px;
  border: 1px solid rgba(255, 209, 102, 0.5);
  border-radius: 15px;
  color: #ffd166;
  background: rgba(255, 209, 102, 0.12);
  font-size: 1rem;
  font-weight: 900;
}
  </style>
</head>
<body>
  <header class="app-bar">
    <button class="toolbar-btn" id="setupButton" type="button">Setup</button>
    <button class="toolbar-btn" id="undoButton" type="button">Undo</button>
    <div class="status" id="statusText"></div>
    <button class="toolbar-btn" id="historyButton" type="button">History</button>
    <button class="toolbar-btn" id="newGameButton" type="button">New Game</button>
  </header>

  <main class="table" id="table" aria-label="Life counter table"></main>

  <div class="modal" id="setupModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">Game Setup</h2>
      <form class="field-grid" id="setupForm">
        <div class="field">
          <label for="modeInput">Format</label>
          <select id="modeInput">
            <option value="duel">Regular</option>
            <option value="commander">Commander</option>
          </select>
        </div>
        <div class="field">
          <label for="playersInput">Players</label>
          <select id="playersInput">
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
            <option value="4">4 Players</option>
          </select>
        </div>
        <div class="field">
          <label for="lifeInput">Starting Life</label>
          <input id="lifeInput" type="number" min="1" max="999" step="1" />
        </div>
        <div class="modal-actions">
          <button class="modal-btn primary" type="submit">Apply</button>
          <button class="modal-btn" id="setupClose" type="button">Close</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="historyModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">Game History</h2>
      <div class="history-list" id="historyList"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="historyClose" type="button">Close</button>
        <button class="modal-btn" id="historyClear" type="button">Clear History</button>
      </div>
    </div>
  </div>

  <div class="modal" id="choiceModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title" id="choiceTitle">Choose</h2>
      <div class="field-grid" id="choiceOptions"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="choiceClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <div class="modal" id="commanderModal" aria-hidden="true">
    <div class="modal-panel">
      <h2 class="modal-title">Commander Damage</h2>
      <div class="damage-entry">
        <div class="damage-source" id="commanderSourceLabel"></div>
        <div class="field">
          <label for="commanderTargetInput">Taking Damage</label>
          <select id="commanderTargetInput"></select>
        </div>
        <div class="damage-preview">
          <span class="pill" id="commanderCurrentTotal">Current 0</span>
          <span class="pill warn" id="commanderPendingAmount">Change +0</span>
          <span class="pill" id="commanderNewTotal">New 0</span>
        </div>
        <div class="damage-stepper">
          <button class="life-btn minus" type="button" data-commander-step="-10">-10</button>
          <button class="life-btn minus" type="button" data-commander-step="-5">-5</button>
          <button class="life-btn minus" type="button" data-commander-step="-1">-1</button>
          <button class="life-btn plus" type="button" data-commander-step="1">+1</button>
          <button class="life-btn plus" type="button" data-commander-step="5">+5</button>
          <button class="life-btn plus" type="button" data-commander-step="10">+10</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn primary" id="commanderConfirm" type="button">Confirm</button>
        <button class="modal-btn" id="commanderClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    const STATE_KEY = 'mtg-life-state-v3';
    const HISTORY_KEY = 'mtg-game-history-v2';
    const MAX_HISTORY = 75;
    const MAX_UNDO = 40;

    const defaults = {
      settings: { mode: 'duel', playerCount: 2, startingLife: 20 },
      currentGameStartedAt: new Date().toISOString(),
      players: [],
      log: [],
      undoStack: []
    };

    const els = {
      table: document.getElementById('table'),
      statusText: document.getElementById('statusText'),
      setupButton: document.getElementById('setupButton'),
      undoButton: document.getElementById('undoButton'),
      historyButton: document.getElementById('historyButton'),
      newGameButton: document.getElementById('newGameButton'),
      setupModal: document.getElementById('setupModal'),
      setupForm: document.getElementById('setupForm'),
      setupClose: document.getElementById('setupClose'),
      modeInput: document.getElementById('modeInput'),
      playersInput: document.getElementById('playersInput'),
      lifeInput: document.getElementById('lifeInput'),
      historyModal: document.getElementById('historyModal'),
      historyList: document.getElementById('historyList'),
      historyClose: document.getElementById('historyClose'),
      historyClear: document.getElementById('historyClear'),
      choiceModal: document.getElementById('choiceModal'),
      choiceTitle: document.getElementById('choiceTitle'),
      choiceOptions: document.getElementById('choiceOptions'),
      choiceClose: document.getElementById('choiceClose'),
      commanderModal: document.getElementById('commanderModal'),
      commanderSourceLabel: document.getElementById('commanderSourceLabel'),
      commanderTargetInput: document.getElementById('commanderTargetInput'),
      commanderCurrentTotal: document.getElementById('commanderCurrentTotal'),
      commanderPendingAmount: document.getElementById('commanderPendingAmount'),
      commanderNewTotal: document.getElementById('commanderNewTotal'),
      commanderConfirm: document.getElementById('commanderConfirm'),
      commanderClose: document.getElementById('commanderClose')
    };

    const deltaTimers = {};
    const deltaTotals = {};
    const pendingLifeChanges = {};
    const rollTimers = {};
    const rollAnimationTimers = {};
    const rollIntervals = {};
    const coinIntervals = {};
    const commanderEntry = {
      sourceId: null,
      targetId: null,
      amount: 0
    };
    const diceLayouts = {
      1: [4],
      2: [0, 8],
      3: [0, 4, 8],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };

    function makePlayer(index, startingLife, previous) {
      return {
        id: previous?.id || `p${index}`,
        name: previous?.name || `Player ${index}`,
        life: Number.isFinite(previous?.life) ? previous.life : startingLife,
        stats: {
          damageTaken: previous?.stats?.damageTaken || 0,
          lifeGained: previous?.stats?.lifeGained || 0
        },
        poison: previous?.poison || 0,
        commanderDamage: previous?.commanderDamage || {},
        eliminated: Boolean(previous?.eliminated)
      };
    }

    function createPlayers(count, startingLife, previous = []) {
      return Array.from({ length: count }, (_, index) => makePlayer(index + 1, startingLife, previous[index]));
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function normalizeState(rawState) {
      if (!rawState) {
        const fresh = clone(defaults);
        fresh.players = createPlayers(2, 20);
        return fresh;
      }

      if (!rawState.players && ('life1' in rawState || 'life2' in rawState)) {
        return {
          settings: { mode: 'duel', playerCount: 2, startingLife: 20 },
          currentGameStartedAt: rawState.currentGameStartedAt || new Date().toISOString(),
          players: [
            makePlayer(1, 20, { name: rawState.name1, life: rawState.life1, stats: rawState.stats?.[1] }),
            makePlayer(2, 20, { name: rawState.name2, life: rawState.life2, stats: rawState.stats?.[2] })
          ],
          log: Array.isArray(rawState.log) ? rawState.log : [],
          undoStack: []
        };
      }

      const settings = {
        ...defaults.settings,
        ...(rawState.settings || {})
      };
      settings.playerCount = Math.min(4, Math.max(2, Number(settings.playerCount) || 2));
      settings.startingLife = Math.min(999, Math.max(1, Number(settings.startingLife) || 20));
      if (!['duel', 'commander'].includes(settings.mode)) settings.mode = 'duel';
      if (settings.mode === 'commander' && settings.startingLife === 20) settings.startingLife = 40;

      return {
        settings,
        currentGameStartedAt: rawState.currentGameStartedAt || new Date().toISOString(),
        players: createPlayers(settings.playerCount, settings.startingLife, rawState.players || []),
        log: Array.isArray(rawState.log) ? rawState.log : [],
        undoStack: Array.isArray(rawState.undoStack) ? rawState.undoStack.slice(0, MAX_UNDO) : []
      };
    }

    function loadState() {
      try {
        return normalizeState(JSON.parse(localStorage.getItem(STATE_KEY)));
      } catch {
        return normalizeState(null);
      }
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    let state = loadState();
    let history = loadHistory();

    function save() {
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function snapshot() {
      return clone({
        settings: state.settings,
        currentGameStartedAt: state.currentGameStartedAt,
        players: state.players,
        log: state.log
      });
    }

    function pushUndo(label) {
      state.undoStack.unshift({ label, at: new Date().toISOString(), snapshot: snapshot() });
      state.undoStack = state.undoStack.slice(0, MAX_UNDO);
    }

    function undoLast() {
      const entry = state.undoStack.shift();
      if (!entry) return;
      const keepUndo = state.undoStack;
      state = normalizeState(entry.snapshot);
      state.undoStack = keepUndo;
      render();
      save();
    }

    function openModal(modal) {
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal(modal) {
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));
    }

    function findPlayer(id) {
      return state.players.find((player) => player.id === id);
    }

    function formatSigned(value) {
      return value > 0 ? `+${value}` : String(value);
    }

    function describeSettings() {
      const mode = state.settings.mode === 'commander' ? 'Commander' : 'Regular';
      return `${mode} · ${state.players.length} players · ${state.settings.startingLife} life`;
    }

    function logAction(type, message, details = {}) {
      state.log.push({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        type,
        message,
        details,
        time: new Date().toISOString()
      });
    }

    function commitPendingLifeChange(playerId) {
      const pending = pendingLifeChanges[playerId];
      if (!pending || pending.amount === 0) {
        pendingLifeChanges[playerId] = null;
        return;
      }

      const player = findPlayer(playerId);
      logAction('life', `${pending.playerName || player?.name || 'Player'} ${pending.previousLife} to ${pending.newLife}`, {
        playerId,
        amount: pending.amount,
        previousLife: pending.previousLife,
        newLife: pending.newLife
      });
      pendingLifeChanges[playerId] = null;
      save();
    }

    function commitAllPendingLifeChanges() {
      Object.keys(pendingLifeChanges).forEach(commitPendingLifeChange);
    }

    function showDelta(playerId, amount, label) {
      const badge = document.querySelector(`[data-delta-for="${playerId}"]`);
      if (!badge) return;
      badge.textContent = label || formatSigned(amount);
      badge.className = 'delta-badge show';
      if (amount > 0) badge.classList.add('positive');
      else if (amount < 0) badge.classList.add('negative');
      else badge.classList.add('neutral');
      clearTimeout(deltaTimers[playerId]);
      deltaTimers[playerId] = setTimeout(() => badge.classList.remove('show'), 1400);
    }

    function showAccumulatedLifeDelta(playerId, amount) {
      deltaTotals[playerId] = (deltaTotals[playerId] || 0) + amount;
      showDelta(playerId, deltaTotals[playerId]);
      clearTimeout(deltaTimers[playerId]);
      deltaTimers[playerId] = setTimeout(() => {
        const badge = document.querySelector(`[data-delta-for="${playerId}"]`);
        if (badge) badge.classList.remove('show');
        commitPendingLifeChange(playerId);
        deltaTotals[playerId] = 0;
      }, 3000);
    }

    function renderDieFace(value) {
      const active = new Set(diceLayouts[value] || diceLayouts[1]);
      return `<div class="die-face" aria-label="Rolled ${value}">
        ${Array.from({ length: 9 }, (_, index) => `<span class="pip ${active.has(index) ? 'on' : ''}"></span>`).join('')}
      </div>`;
    }

    function showRoll(playerId, value) {
      const badge = document.querySelector(`[data-roll-for="${playerId}"]`);
      if (!badge) return;
      clearTimeout(rollTimers[playerId]);
      clearTimeout(rollAnimationTimers[playerId]);
      clearInterval(rollIntervals[playerId]);
      clearInterval(coinIntervals[playerId]);
      badge.classList.remove('show', 'rolling', 'flipping', 'coin-result');
      const spinValues = [1, 3, 5, 2, 4, 6];
      let index = 0;
      badge.innerHTML = renderDieFace(spinValues[0]);
      badge.classList.add('rolling');
      rollIntervals[playerId] = setInterval(() => {
        index = (index + 1) % spinValues.length;
        badge.innerHTML = renderDieFace(spinValues[index]);
      }, 90);
      rollAnimationTimers[playerId] = setTimeout(() => {
        clearInterval(rollIntervals[playerId]);
        badge.innerHTML = renderDieFace(value);
        badge.classList.remove('rolling');
        badge.classList.add('show');
        rollTimers[playerId] = setTimeout(() => badge.classList.remove('show'), 2000);
      }, 700);
    }

    function showChoiceResult(playerId, value) {
      const badge = document.querySelector(`[data-roll-for="${playerId}"]`);
      if (!badge) return;
      clearTimeout(rollTimers[playerId]);
      clearTimeout(rollAnimationTimers[playerId]);
      clearInterval(rollIntervals[playerId]);
      clearInterval(coinIntervals[playerId]);
      badge.classList.remove('rolling', 'flipping', 'coin-result');
      badge.textContent = value;
      badge.classList.add('show');
      rollTimers[playerId] = setTimeout(() => badge.classList.remove('show'), 2000);
    }

    function renderCoinFace(value) {
      return `<div class="coin-face" aria-label="${value}">${value === 'Heads' ? 'H' : 'T'}</div>`;
    }

    function showCoinFlip(playerId, value) {
      const badge = document.querySelector(`[data-roll-for="${playerId}"]`);
      if (!badge) return;
      clearTimeout(rollTimers[playerId]);
      clearTimeout(rollAnimationTimers[playerId]);
      clearInterval(rollIntervals[playerId]);
      clearInterval(coinIntervals[playerId]);
      badge.classList.remove('show', 'rolling', 'flipping', 'coin-result');
      const faces = ['Heads', 'Tails'];
      let index = 0;
      badge.innerHTML = renderCoinFace(faces[index]);
      badge.classList.add('flipping');
      coinIntervals[playerId] = setInterval(() => {
        index = (index + 1) % faces.length;
        badge.innerHTML = renderCoinFace(faces[index]);
      }, 90);
      rollAnimationTimers[playerId] = setTimeout(() => {
        clearInterval(coinIntervals[playerId]);
        badge.innerHTML = renderCoinFace(value);
        badge.classList.remove('flipping');
        badge.classList.add('show', 'coin-result');
        rollTimers[playerId] = setTimeout(() => badge.classList.remove('show'), 2000);
      }, 900);
    }

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }
function isAngel(player) {
  return player.name.trim().toLowerCase() === 'angel';
}

function catBlessing(playerId) {
  if (state.players.length !== 2) return;

  const angel = findPlayer(playerId);
  if (!angel || !isAngel(angel)) return;

  const opponent = state.players.find((player) => player.id !== playerId);
  if (!opponent) return;

  commitAllPendingLifeChanges();
  pushUndo(`${angel.name} cat blessing`);

  angel.life += 1;
  opponent.life -= 1;

  angel.stats.lifeGained += 1;
  opponent.stats.damageTaken += 1;

  logAction('cat', `${angel.name} used Cat Blessing: +1 life to ${angel.name}, -1 life to ${opponent.name}`, {
    playerId: angel.id,
    opponentId: opponent.id,
    amount: 1
  });

  render();
  save();

  showDelta(angel.id, 1, '+1 🐱');
  showDelta(opponent.id, -1, '-1 🐱');

  vibrate([15, 20, 15]);
}
    function changeLife(playerId, amount) {
      const player = findPlayer(playerId);
      if (!player) return;
      pushUndo(`${player.name} life ${formatSigned(amount)}`);
      const previousLife = pendingLifeChanges[playerId]?.previousLife ?? player.life;
      player.life += amount;
      if (amount < 0) player.stats.damageTaken += Math.abs(amount);
      if (amount > 0) player.stats.lifeGained += amount;
      pendingLifeChanges[playerId] = {
        playerId,
        playerName: player.name,
        amount: (pendingLifeChanges[playerId]?.amount || 0) + amount,
        previousLife,
        newLife: player.life
      };
      render();
      save();
      showAccumulatedLifeDelta(playerId, amount);
      vibrate(10);
    }

    function changePoison(playerId, amount) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      pushUndo(`${player.name} poison ${formatSigned(amount)}`);
      player.poison = Math.max(0, player.poison + amount);
      logAction('poison', `${player.name} poison ${formatSigned(amount)}`, { playerId, amount, poison: player.poison });
      render();
      save();
      showDelta(playerId, amount, `${player.poison} poison`);
      vibrate(10);
    }

    function changeCommanderDamage(targetId, sourceId, amount) {
      const target = findPlayer(targetId);
      const source = findPlayer(sourceId);
      if (!target || !source || targetId === sourceId) return;
      commitAllPendingLifeChanges();
      pushUndo(`${source.name} commander damage to ${target.name}`);
      target.commanderDamage[sourceId] = Math.max(0, (target.commanderDamage[sourceId] || 0) + amount);
      const total = target.commanderDamage[sourceId];
      logAction('commander', `${source.name} dealt commander damage to ${target.name}`, {
        targetId,
        sourceId,
        amount,
        total
      });
      render();
      save();
      showDelta(targetId, amount, `${total} cmdr`);
      vibrate(10);
    }

    function toggleEliminated(playerId) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      pushUndo(`${player.name} eliminated`);
      player.eliminated = !player.eliminated;
      logAction('eliminated', `${player.name} ${player.eliminated ? 'eliminated' : 'returned'}`, { playerId, eliminated: player.eliminated });
      render();
      save();
    }

    function rollDie(playerId) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      const value = Math.floor(Math.random() * 6) + 1;
      logAction('roll', `${player.name} rolled ${value}`, { playerId, value });
      showRoll(playerId, value);
      save();
      vibrate([15, 20, 15]);
    }

    function flipCoin(playerId) {
      const player = findPlayer(playerId);
      if (!player) return;
      commitAllPendingLifeChanges();
      const value = Math.random() < 0.5 ? 'Heads' : 'Tails';
      logAction('coin', `${player.name} flipped ${value}`, { playerId, value });
      showCoinFlip(playerId, value);
      save();
      vibrate([18, 24, 18]);
    }

    function hasActivity() {
      return state.players.some((player) =>
        player.life !== state.settings.startingLife ||
        player.stats.damageTaken ||
        player.stats.lifeGained ||
        player.poison ||
        Object.values(player.commanderDamage || {}).some(Boolean) ||
        player.eliminated
      ) || state.log.length;
    }

    function makeGameRecord() {
      commitAllPendingLifeChanges();
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        settings: clone(state.settings),
        startedAt: state.currentGameStartedAt,
        endedAt: new Date().toISOString(),
        players: clone(state.players),
        log: clone(state.log)
      };
    }

    function resetForNewGame(preserveNames = true) {
      const previous = preserveNames ? state.players.map((player) => ({ id: player.id, name: player.name })) : [];
      state.players = createPlayers(state.settings.playerCount, state.settings.startingLife, previous);
      state.currentGameStartedAt = new Date().toISOString();
      state.log = [];
      state.undoStack = [];
    }

    function startNewGame() {
      commitAllPendingLifeChanges();
      if (hasActivity()) {
        history.unshift(makeGameRecord());
        history = history.slice(0, MAX_HISTORY);
        saveHistory();
      }
      resetForNewGame(true);
      render();
      save();
    }

    function applySetup(event) {
      event.preventDefault();
      commitAllPendingLifeChanges();
      const nextSettings = {
        mode: els.modeInput.value,
        playerCount: Number(els.playersInput.value),
        startingLife: Math.min(999, Math.max(1, Number(els.lifeInput.value) || 20))
      };
      const previousPlayers = state.players.map((player) => ({ id: player.id, name: player.name }));
      pushUndo('setup change');
      state.settings = nextSettings;
      state.players = createPlayers(nextSettings.playerCount, nextSettings.startingLife, previousPlayers);
      state.players.forEach((player) => {
        player.commanderDamage = Object.fromEntries(
          Object.entries(player.commanderDamage || {}).filter(([id]) => state.players.some((other) => other.id === id))
        );
      });
      logAction('setup', `Setup changed to ${nextSettings.mode}, ${nextSettings.playerCount} players, ${nextSettings.startingLife} life`);
      closeModal(els.setupModal);
      render();
      save();
    }

    function openSetup() {
      els.modeInput.value = state.settings.mode;
      els.playersInput.value = String(state.settings.playerCount);
      els.lifeInput.value = String(state.settings.startingLife);
      openModal(els.setupModal);
    }

    function openChoice(title, options) {
      els.choiceTitle.textContent = title;
      els.choiceOptions.innerHTML = options.map((option) => (
        `<button class="modal-btn primary" type="button" data-choice="${escapeHtml(option.value)}">${escapeHtml(option.label)}</button>`
      )).join('');
      els.choiceOptions.querySelectorAll('[data-choice]').forEach((button) => {
        button.addEventListener('click', () => {
          const option = options.find((item) => item.value === button.dataset.choice);
          if (option) option.run();
          closeModal(els.choiceModal);
        });
      });
      openModal(els.choiceModal);
    }

    function getCommanderTargetOptions(sourceId) {
      return state.players.filter((player) => player.id !== sourceId);
    }

    function getCommanderEntryTotal() {
      const target = findPlayer(commanderEntry.targetId);
      if (!target || !commanderEntry.sourceId) return 0;
      return target.commanderDamage?.[commanderEntry.sourceId] || 0;
    }

    function updateCommanderDamagePreview() {
      const current = getCommanderEntryTotal();
      const next = Math.max(0, current + commanderEntry.amount);
      els.commanderCurrentTotal.textContent = `Current ${current}`;
      els.commanderPendingAmount.textContent = `Change ${formatSigned(commanderEntry.amount)}`;
      els.commanderNewTotal.textContent = `New ${next}`;
      els.commanderNewTotal.classList.toggle('danger', next >= 21);
      els.commanderNewTotal.classList.toggle('warn', next >= 15 && next < 21);
      els.commanderConfirm.disabled = commanderEntry.amount === 0;
    }

    function openCommanderDamage(sourceId) {
      const source = findPlayer(sourceId);
      if (!source) return;
      const targets = getCommanderTargetOptions(sourceId);
      commanderEntry.sourceId = sourceId;
      commanderEntry.targetId = targets[0]?.id || null;
      commanderEntry.amount = 0;
      els.commanderSourceLabel.textContent = `${source.name} is dealing commander damage`;
      els.commanderTargetInput.innerHTML = targets.map((target) => (
        `<option value="${escapeHtml(target.id)}">${escapeHtml(target.name)}</option>`
      )).join('');
      updateCommanderDamagePreview();
      openModal(els.commanderModal);
    }

    function adjustCommanderEntry(amount) {
      commanderEntry.amount += amount;
      const current = getCommanderEntryTotal();
      if (current + commanderEntry.amount < 0) commanderEntry.amount = -current;
      updateCommanderDamagePreview();
    }

    function confirmCommanderDamage() {
      if (!commanderEntry.sourceId || !commanderEntry.targetId || commanderEntry.amount === 0) return;
      changeCommanderDamage(commanderEntry.targetId, commanderEntry.sourceId, commanderEntry.amount);
      commanderEntry.sourceId = null;
      commanderEntry.targetId = null;
      commanderEntry.amount = 0;
      closeModal(els.commanderModal);
    }

          }).join('')}

    function render() {
      els.table.className = `table ${state.players.length === 2 ? 'duel' : 'multiplayer'}`;
      document.body.classList.toggle('is-multiplayer', state.players.length > 2);
      document.body.classList.toggle('is-duel-scroll', state.players.length === 2 && window.innerHeight < 760);
      els.table.innerHTML = state.players.map(renderPlayer).join('');
      els.statusText.textContent = describeSettings();
      els.undoButton.disabled = !state.undoStack.length;
      bindNameEditors();
    }

    function bindNameEditors() {
      els.table.querySelectorAll('[data-name-for]').forEach((el) => {
        el.addEventListener('blur', () => {
          const player = findPlayer(el.dataset.nameFor);
          if (!player) return;
          const nextName = el.textContent.trim() || player.name;
          if (nextName === player.name) {
            el.textContent = player.name;
            return;
          }
          pushUndo(`rename ${player.name}`);
          player.name = nextName;
          logAction('name', `Renamed player to ${nextName}`, { playerId: player.id });
          render();
          save();
        });
        el.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            el.blur();
          }
        });
      });
    }

    function formatShortDate(value) {
      return new Date(value).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function renderLog(log) {
      if (!log.length) return '<div class="empty-note">No actions recorded yet.</div>';
      return `<div class="log-list">${log.slice(-18).reverse().map((entry) => `
        <div class="log-entry">

          <span class="${entry.details?.amount > 0 ? 'good' : entry.details?.amount < 0 ? 'danger' : ''}">
            ${typeof entry.details?.amount === 'number' ? formatSigned(entry.details.amount) : formatShortDate(entry.time)}
          </span>
        </div>
      `).join('')}</div>`;
    }

    function renderHistoryCard(game, title) {
      const players = game.players.map((player) => `${escapeHtml(player.name)} ${player.life}`).join(' · ');
      const mode = game.settings?.mode === 'commander' ? 'Commander' : 'Regular';
      return `
        <div class="history-item">
          <button type="button" data-action="expand-history">
            ${escapeHtml(title)}: ${players}
          </button>
          <div class="history-details">
            ${mode} · ${game.players.length} players · ${formatShortDate(game.startedAt)} to ${formatShortDate(game.endedAt)}
            ${renderLog(game.log || [])}
          </div>
        </div>
      `;
    }

    function renderHistory() {
      commitAllPendingLifeChanges();
      const current = {
        settings: state.settings,
        startedAt: state.currentGameStartedAt,
        endedAt: new Date().toISOString(),
        players: state.players,
        log: state.log
      };
      const completed = history.length
        ? history.map((game, index) => renderHistoryCard(game, `Game ${history.length - index}`)).join('')
        : '<div class="history-item"><strong>No completed games yet</strong><div class="history-details">Press New Game after tracking a game to save it here.</div></div>';

      els.historyList.innerHTML = renderHistoryCard(current, 'Current Game') + completed;
      els.historyList.querySelectorAll('[data-action="expand-history"]').forEach((button) => {
        button.addEventListener('click', () => button.closest('.history-item').classList.toggle('expanded'));
      });
    }

    function bindEvents() {
      els.table.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const playerId = button.dataset.player;
        const amount = Number(button.dataset.amount || 0);
        if (button.dataset.action === 'life') changeLife(playerId, amount);
        if (button.dataset.action === 'poison') changePoison(playerId, amount);
        if (button.dataset.action === 'commander') openCommanderDamage(playerId);
        if (button.dataset.action === 'eliminate') toggleEliminated(playerId);if (button.dataset.action === 'roll') rollDie(playerId);
if (button.dataset.action === 'coin') flipCoin(playerId);
if (button.dataset.action === 'cat') catBlessing(playerId);

      });

      els.setupButton.addEventListener('click', openSetup);
      els.setupForm.addEventListener('submit', applySetup);
      els.setupClose.addEventListener('click', () => closeModal(els.setupModal));
      els.setupModal.addEventListener('click', (event) => { if (event.target === els.setupModal) closeModal(els.setupModal); });

      els.modeInput.addEventListener('change', () => {
        if (els.modeInput.value === 'commander') {
          els.lifeInput.value = els.lifeInput.value === '20' ? '40' : els.lifeInput.value;
          els.playersInput.value = Number(els.playersInput.value) < 3 ? '4' : els.playersInput.value;
        } else {
          els.lifeInput.value = '20';
          els.playersInput.value = '2';
        }
      });

      els.undoButton.addEventListener('click', undoLast);
      els.newGameButton.addEventListener('click', startNewGame);

      els.historyButton.addEventListener('click', () => {
        renderHistory();
        openModal(els.historyModal);
      });
      els.historyClose.addEventListener('click', () => closeModal(els.historyModal));
      els.historyModal.addEventListener('click', (event) => { if (event.target === els.historyModal) closeModal(els.historyModal); });
      els.historyClear.addEventListener('click', () => {
        history = [];
        saveHistory();
        renderHistory();
      });

      els.choiceClose.addEventListener('click', () => closeModal(els.choiceModal));
      els.choiceModal.addEventListener('click', (event) => { if (event.target === els.choiceModal) closeModal(els.choiceModal); });

      els.commanderTargetInput.addEventListener('change', () => {
        commanderEntry.targetId = els.commanderTargetInput.value;
        commanderEntry.amount = 0;
        updateCommanderDamagePreview();
      });
      els.commanderModal.querySelectorAll('[data-commander-step]').forEach((button) => {
        button.addEventListener('click', () => adjustCommanderEntry(Number(button.dataset.commanderStep)));
      });
      els.commanderConfirm.addEventListener('click', confirmCommanderDamage);
      els.commanderClose.addEventListener('click', () => closeModal(els.commanderModal));
      els.commanderModal.addEventListener('click', (event) => { if (event.target === els.commanderModal) closeModal(els.commanderModal); });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          [els.setupModal, els.historyModal, els.choiceModal, els.commanderModal].forEach(closeModal);
        }
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'z') {
          event.preventDefault();
          undoLast();
        }
      });
    }

    function runSelfTests() {
      console.assert(state.players.length >= 2, 'Expected at least two players');
      console.assert(typeof changeLife === 'function', 'Expected changeLife function');
      console.assert(typeof undoLast === 'function', 'Expected undo function');
      console.assert(Array.isArray(state.undoStack), 'Undo stack should be an array');
      console.assert(Array.isArray(history), 'History should be an array');
      console.assert(escapeHtml('<x>') === '&lt;x&gt;', 'escapeHtml should encode angle brackets');
    }

    render();
    bindEvents();
    runSelfTests();
    save();
  </script>
</body>
</html>
